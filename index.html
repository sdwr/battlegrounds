/* ============================== RENDER ============================== */
const ART = {Spores:'🍄', Embers:'🔥', Swarm:'🐛', Golems:'🗿', Phantoms:'👻', Raiders:'🏴‍☠️',
  Mirrors:'🪞', Wardens:'🛡️', Alchemists:'⚗️', Titans:'⛰️',
  Beast:'🐺', Mech:'⚙️', Demon:'😈', Dragon:'🐉', Murloc:'🐟', Neutral:'👤'};
// Keyword definitions: [emoji, name, description]. Used for card chips + hover tooltip.
const KW_DESC = {
  taunt:['🛡','Taunt','Enemy minions must attack this minion first.'],
  shield:['✦','Divine Shield','The first time this minion takes damage, ignore it.'],
  cleave:['↔','Cleave','Also damages the minions adjacent to its target.'],
  windfury:['↻','Windfury','Attacks twice each combat turn.'],
  reborn:['♻','Reborn','The first time this dies, return it with 1 Health.'],
  toxin:['☠','Toxin','When this damages a minion, it is poisoned for the damage dealt. A poisoned minion loses that much Health after each time it attacks, and once more at the end of combat. Scales with Attack; a hit fully absorbed by a Shield or Bulwark poisons for nothing.'],
  bulwark:['⛨','Bulwark','Absorbs incoming damage like armor before any Health is lost.'],
  kindle:['🔥','Kindle','After another friendly minion attacks, gain Attack.'],
  haunt:['⚰','Haunt','Whenever a friendly minion dies, gain Attack.'],
  plunder:['⚓','Plunder','When you buy this, it gains Attack.'],
  apex:['⛰','Apex','After you sell another Titan, this minion gains +2/+2.'],
  brood:['🐛','Brood','Deathrattle: summon that many 1/1 Swarmlings.'],
  suppress:['🔇','Suppress','At combat start, removes keywords from the adjacent enemy minions.'],
  reflect:['🪞','Reflect','In combat, counts as the tribe of the minion on its left for tribal synergies.'],
};
// Which keywords (and their values) are active on a minion.
function activeKeywords(m){
  const out=[];
  if(m.taunt) out.push(['taunt',null]);
  if(m.shield) out.push(['shield',null]);
  if(m.cleave) out.push(['cleave',null]);
  if(m.windfury) out.push(['windfury',null]);
  if(m.reborn) out.push(['reborn',null]);
  if(m.toxin) out.push(['toxin',null]);
  if(m.bulwark>0) out.push(['bulwark',m.bulwark]);
  if(m.kindle>0) out.push(['kindle',m.kindle]);
  if(m.haunt>0) out.push(['haunt',m.haunt]);
  if(m.plunder>0) out.push(['plunder',m.plunder]);
  if(m.apex) out.push(['apex',null]);
  if(m.brood>0) out.push(['brood',m.brood>1?m.brood:null]);
  if(m.suppress) out.push(['suppress',null]);
  if(m.reflect) out.push(['reflect',null]);
  return out;
}
function cardHTML(m, opt={}){
  if(m.spell){
    const scls=['card','spell']; if(opt.zone) scls.push('z-'+opt.zone); if(opt.noafford) scls.push('noafford');
    const canDrag = (opt.zone==='hand') || (opt.zone==='shop' && !opt.noafford);
    return `<div class="${scls.join(' ')}" ${canDrag?'draggable="true"':'draggable="false"'} data-idx="${opt.idx??''}" data-zone="${opt.zone||''}" data-cid="${m.id}">
      <div class="spellcost" title="Cost">${m.cost}</div>
      <div class="frame"></div>
      <div class="nm">${m.name}</div>
      <div class="art">${m.art}</div>
      <div class="tribe">Spell</div>
      <div class="spelltext">${m.text}</div>
    </div>`;
  }
  const cls=['card'];
  if(m.golden) cls.push('golden');
  if(m.taunt) cls.push('taunt');
  if(m.shield) cls.push('shield');
  if(opt.sel) cls.push('sel');
  if(opt.targetable) cls.push('targetable');
  if(opt.bcsrc) cls.push('bc-src');
  if(opt.noafford) cls.push('noafford');
  if(opt.zone) cls.push('z-'+opt.zone);
  const keys = activeKeywords(m).map(([k,n])=>{ const d=KW_DESC[k];
    return `<span class="kw" data-kw="${k}">${d[0]} ${d[1]}${n?' '+n:''}</span>`; }).join('');
  const stars = '★'.repeat(Math.min(m.t,6));
  const banner = `<div class="tavbanner" title="Tier ${m.t}">${stars}</div>`;
  const canDrag = (opt.zone==='board') || (opt.zone==='hand') || (opt.zone==='shop' && !opt.noafford);
  const drag = canDrag ? 'draggable="true"' : 'draggable="false"';
  return `<div class="${cls.join(' ')}" ${drag} data-idx="${opt.idx??''}" data-zone="${opt.zone||''}" data-cid="${m.id}">
    ${banner}
    ${m.golden?'<div class="goldbadge">✦</div>':''}
    <div class="frame"></div>
    <div class="nm">${m.name}</div>
    <div class="art">${ART[m.tribe]||'❔'}</div>
    <div class="tribe">${m.tribe}</div>
    <div class="keys">${keys}</div>
    <div class="atk">${m.a}</div>
    <div class="hp">${m.h}</div>
  </div>`;
}

function render(){
  const p=me();
  // status
  document.getElementById('hdrRound').textContent=state.round;
  document.getElementById('hdrTier').textContent=p.tier;
  document.getElementById('bobTier').textContent=p.tier;
  document.getElementById('hdrGold').textContent=p.gold;
  document.getElementById('hdrGoldMax').textContent=p.goldMax;
  document.getElementById('hdrHp').textContent=p.hp;
  document.getElementById('hdrPhase').textContent = state.phase==='buy'?'Recruit':state.phase==='combat'?'Combat':'Game Over';
  document.getElementById('topbar').classList.toggle('combat', state.phase==='combat');

  // gold pips
  const gmax=Math.min(10,Math.max(p.goldMax,p.gold));
  let pips='';
  for(let i=0;i<gmax;i++) pips += `<span class="pip ${i<p.gold?'on':''}"></span>`;
  document.getElementById('goldPips').innerHTML=pips;

  // roster strip
  document.getElementById('roster').innerHTML = state.players.map(pl=>`
    <div class="rp ${pl.dead?'dead':''} ${pl.you?'you':''}" title="${pl.name}">
      <div class="rp-portrait">${pl.you?'🧝‍♀️':'🤖'}<span class="rp-tier">${pl.tier}</span></div>
      <div class="rp-name">${pl.name}</div>
      <div class="rp-hp">${pl.dead?'☠':(pl.hp>0?pl.hp:0)}</div>
    </div>`).join('');

  // shop — affordability is per-card (spells have their own cost; buying goes to hand)
  const handFull = (p.hand||[]).length>=HAND_MAX;
  document.getElementById('shop').innerHTML = p.shop.map((c,i)=>{
    const cost = c.cost!=null ? c.cost : 3;
    return cardHTML(c,{idx:i,zone:'shop',noafford:(p.gold<cost||handFull)});
  }).join('') || '<div class="slot"></div>';

  // board — render only the actual minions; the centered zone keeps them in the middle (HS-style)
  let bh='';
  const tg=state.targeting;
  p.board.forEach((bm,i)=>{
    bh += cardHTML(bm,{idx:i,zone:'board',sel:state.sel===i,
            targetable: tg && tg.ids.has(bm.id), bcsrc: tg && tg.src===bm});
  });
  document.getElementById('board').innerHTML = bh ||
    '<div class="board-empty">Drag minions here from your hand</div>';
  document.getElementById('boardCount').textContent = `${p.board.length} / ${MAX_BOARD}`;

  // hand
  const hand = p.hand||[];
  document.getElementById('hand').innerHTML = hand.length
    ? hand.map((c,i)=>cardHTML(c,{idx:i,zone:'hand'})).join('')
    : '<div class="hand-empty">Buy minions &amp; spells — they land here. Drag a minion to the board to play it; drag a spell onto a minion to cast it.</div>';
  document.getElementById('handCount').textContent = hand.length ? `${hand.length} / ${HAND_MAX}` : '';

  // controls
  const buyPhase = state.phase==='buy';
  document.getElementById('btnRoll').disabled = !buyPhase || p.gold<1;
  document.getElementById('btnEnd').disabled = !buyPhase;
  const uc=upgradeCost(p);
  document.getElementById('upCost').textContent = p.tier>=MAX_TIER?'MAX':uc;
  document.getElementById('btnUpgrade').disabled = !buyPhase || p.tier>=MAX_TIER || p.gold<uc;
  document.getElementById('btnFreeze').classList.toggle('active', !!state.frozen);
  document.getElementById('btnFreeze').disabled = !buyPhase;
  const hasSel = state.sel!=null && p.board[state.sel];
  document.getElementById('btnSell').disabled = !buyPhase || !hasSel;
  document.getElementById('btnLeft').disabled = !buyPhase || !hasSel || state.sel===0;
  document.getElementById('btnRight').disabled = !buyPhase || !hasSel || state.sel===p.board.length-1;

  bindCards();
}

let dragSrc=null;
function bindCards(){
  document.querySelectorAll('#shop .card').forEach(el=>{
    el.onclick=()=>{ if(targetingActive()||state.phase!=='buy') return; buyMinion(me(), +el.dataset.idx); render(); };  // buy -> hand
    el.ondragstart=e=>{
      if(state.phase!=='buy'||targetingActive()){ e.preventDefault(); return; }
      const c=me().shop[+el.dataset.idx]; const cost=c&&c.cost!=null?c.cost:3;
      if(me().gold<cost){ e.preventDefault(); toast('Not enough gold'); return; }
      if((me().hand||[]).length>=HAND_MAX){ e.preventDefault(); toast('Hand is full'); return; }
      dragSrc={type:'shop',idx:+el.dataset.idx,spell:!!(c&&c.spell)}; e.dataTransfer.effectAllowed='copy'; el.style.opacity='.4';
    };
    el.ondragend=()=>{ dragSrc=null; el.style.opacity=''; clearDragHints(); };
  });
  document.querySelectorAll('#board .card').forEach(el=>{
    el.onclick=()=>{ if(targetingActive()){ resolveTarget(me().board[+el.dataset.idx]); return; }
      if(state.phase!=='buy') return; const i=+el.dataset.idx; state.sel = state.sel===i?null:i; render(); };
    el.ondragstart=e=>{ if(state.phase!=='buy'||targetingActive()){ e.preventDefault(); return; } dragSrc={type:'board',idx:+el.dataset.idx}; e.dataTransfer.effectAllowed='move'; el.style.opacity='.4'; };
    el.ondragend=()=>{ dragSrc=null; el.style.opacity=''; clearDragHints(); };
  });
  // hand: click to play (minions -> board; non-target spells -> cast); drag to board to place/target
  document.querySelectorAll('#hand .card').forEach(el=>{
    el.onclick=()=>{
      if(targetingActive()||state.phase!=='buy') return;
      const i=+el.dataset.idx, c=me().hand[i]; if(!c) return;
      if(c.spell){ if(c.target==='friendly') toast('Drag this spell onto one of your minions'); else { playSpell(me(),i,null); render(); } }
      else { playMinion(me(), i, me().board.length); render(); }
    };
    el.ondragstart=e=>{
      if(state.phase!=='buy'||targetingActive()){ e.preventDefault(); return; }
      const c=me().hand[+el.dataset.idx];
      dragSrc={type:'hand',idx:+el.dataset.idx,spell:!!(c&&c.spell),target:c&&c.target};
      e.dataTransfer.effectAllowed='move'; el.style.opacity='.4';
    };
    el.ondragend=()=>{ dragSrc=null; el.style.opacity=''; clearDragHints(); };
  });
}
// the board minion under a screen point (for targeted spells)
function boardMinionAt(x,y){
  const el=document.elementFromPoint(x,y); const card=el&&el.closest&&el.closest('#board .card');
  if(!card) return null;
  return me().board[+card.dataset.idx]||null;
}
function dropIndex(zoneEl, clientX){
  const kids=[...zoneEl.querySelectorAll('.card,.slot')];
  for(let i=0;i<kids.length;i++){
    const r=kids[i].getBoundingClientRect();
    if(clientX < r.left + r.width/2) return i;
  }
  return kids.length;
}
function clearDragHints(){
  document.getElementById('board').classList.remove('drag-hover');
  document.getElementById('shop').classList.remove('sell-hover');
  document.getElementById('hand').classList.remove('drag-hover');
}
function setupDrag(){
  const zone=document.getElementById('board');
  zone.addEventListener('dragover', e=>{ if(dragSrc && state.phase==='buy'){ e.preventDefault(); zone.classList.add('drag-hover'); } });
  zone.addEventListener('dragleave', e=>{ if(!zone.contains(e.relatedTarget)) zone.classList.remove('drag-hover'); });
  zone.addEventListener('drop', e=>{
    if(!dragSrc || state.phase!=='buy') return;
    e.preventDefault();
    const to=dropIndex(zone, e.clientX);
    if(dragSrc.type==='shop'){
      if(dragSrc.spell) buyMinion(me(), dragSrc.idx);        // a spell just goes to hand
      else buyAndPlay(me(), dragSrc.idx, to);
    } else if(dragSrc.type==='board'){
      moveMinion(dragSrc.idx, to);
    } else if(dragSrc.type==='hand'){
      const c=me().hand[dragSrc.idx];
      if(c && c.spell){
        if(c.target==='friendly'){ const t=boardMinionAt(e.clientX,e.clientY); if(t) playSpell(me(),dragSrc.idx,t); else toast('Drop the spell onto a minion'); }
        else playSpell(me(),dragSrc.idx,null);
      } else playMinion(me(), dragSrc.idx, to);
    }
    dragSrc=null; clearDragHints(); render();
  });

  // drag a board minion onto the tavern to sell it
  const shop=document.getElementById('shop');
  shop.addEventListener('dragover', e=>{ if(dragSrc && dragSrc.type==='board' && state.phase==='buy'){ e.preventDefault(); shop.classList.add('sell-hover'); } });
  shop.addEventListener('dragleave', e=>{ if(!shop.contains(e.relatedTarget)) shop.classList.remove('sell-hover'); });
  shop.addEventListener('drop', e=>{
    if(!dragSrc || dragSrc.type!=='board' || state.phase!=='buy') return;
    e.preventDefault();
    sellMinion(me(), dragSrc.idx); state.sel=null;
    dragSrc=null; clearDragHints(); render();
  });

  // the hand is also a drop target: buy a shop card into it, or re-order won't matter
  const hand=document.getElementById('hand');
  hand.addEventListener('dragover', e=>{ if(dragSrc && (dragSrc.type==='shop') && state.phase==='buy'){ e.preventDefault(); hand.classList.add('drag-hover'); } });
  hand.addEventListener('dragleave', e=>{ if(!hand.contains(e.relatedTarget)) hand.classList.remove('drag-hover'); });
  hand.addEventListener('drop', e=>{
    if(!dragSrc || dragSrc.type!=='shop' || state.phase!=='buy') return;
    e.preventDefault();
    buyMinion(me(), dragSrc.idx);
    dragSrc=null; clearDragHints(); render();
  });
}

/* ============================== SOUND ============================== */
let audioCtx=null, soundOn=true;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){ audioCtx=null; }
}
// browsers require a user gesture before audio; resume on any pointer input
document.addEventListener('pointerdown', ensureAudio);
function bonk(){
  if(!soundOn) return;
  ensureAudio(); if(!audioCtx) return;
  const t=audioCtx.currentTime, v=0.35+Math.random()*0.1;
  // low woody thump
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(230+Math.random()*40,t);
  o.frequency.exponentialRampToValueAtTime(62,t+0.13);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(v,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
  o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+0.22);
  // short noise "knock" for the attack of the bonk
  const sr=audioCtx.sampleRate, len=Math.floor(sr*0.05), buf=audioCtx.createBuffer(1,len,sr), data=buf.getChannelData(0);
  for(let k=0;k<len;k++) data[k]=(Math.random()*2-1)*Math.pow(1-k/len,2.2);
  const ns=audioCtx.createBufferSource(); ns.buffer=buf;
  const ng=audioCtx.createGain(); ng.gain.value=0.28;
  ns.connect(ng).connect(audioCtx.destination); ns.start(t);
}

/* ---- generic synth helpers for UI sound effects ---- */
function blip({type='sine', f0, f1=null, t0=0, dur=0.18, v=0.3, decay=null}){
  ensureAudio(); if(!audioCtx) return;
  const t=audioCtx.currentTime+t0, end=decay||dur;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,t);
  if(f1!=null) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(v,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+end);
  o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+end+0.02);
}
function noiseBurst({t0=0, dur=0.05, v=0.2, decayPow=2.2}){
  ensureAudio(); if(!audioCtx) return;
  const t=audioCtx.currentTime+t0, sr=audioCtx.sampleRate, len=Math.max(1,Math.floor(sr*dur));
  const buf=audioCtx.createBuffer(1,len,sr), d=buf.getChannelData(0);
  for(let k=0;k<len;k++) d[k]=(Math.random()*2-1)*Math.pow(1-k/len,decayPow);
  const ns=audioCtx.createBufferSource(); ns.buffer=buf;
  const ng=audioCtx.createGain(); ng.gain.value=v;
  ns.connect(ng).connect(audioCtx.destination); ns.start(t);
}

/* ============================== TOOLTIPS ============================== */
const tipEl = document.getElementById('tip');
let tipShown=false;
function positionTip(x,y){
  const pad=14, w=tipEl.offsetWidth, h=tipEl.offsetHeight;
  let left=x+18, top=y+18;
  if(left+w+pad>window.innerWidth) left=x-w-18;
  if(top+h+pad>window.innerHeight) top=y-h-18;
  tipEl.style.left=Math.max(pad,left)+'px';
  tipEl.style.top=Math.max(pad,top)+'px';
}
function hideTip(){ if(tipShown){ tipEl.classList.remove('show'); tipShown=false; } }
document.addEventListener('mouseover', e=>{
  const kw = e.target.closest && e.target.closest('.kw');
  if(!kw) return;                           // tooltips are keyword-only
  const d=KW_DESC[kw.dataset.kw]; if(!d) return;
  tipEl.innerHTML = `<div class="tip-head"><span class="tip-art">${d[0]}</span>
    <div><div class="tip-name">${d[1]}</div><div class="tip-sub">Keyword</div></div></div>
    <div class="tip-kws"><div class="tk"><span>${d[2]}</span></div></div>`;
  tipEl.classList.add('show'); tipShown=true; positionTip(e.clientX,e.clientY);
});
document.addEventListener('mousemove', e=>{ if(tipShown) positionTip(e.clientX,e.clientY); });
document.addEventListener('mouseout', e=>{
  const to=e.relatedTarget;
  if(to && to.closest && to.closest('.kw')) return; // moving between chips
  hideTip();
});

/* ============================== TARGETED BATTLECRY (arrow) ============================== */
function targetingActive(){ return !!(state && state.targeting); }
function beginTargeting(src, targets){
  state.targeting = { src, ids:new Set(targets.map(m=>m.id)) };
  document.body.classList.add('targeting');
}
function endTargeting(){ if(state) state.targeting=null; document.body.classList.remove('targeting'); hideArrow(); }
function resolveTarget(t){
  const tg=state.targeting; if(!tg) return;
  if(!t || !tg.ids.has(t.id)){ toast('Pick a highlighted Titan'); return; }
  const p=me(), src=tg.src, fx=EFFECTS[src.fx];
  fx.bcResolve(p, src, t);
  if(src.golden){ const more=fx.bcTarget(p, src); if(more.length) fx.bcResolve(p, src, more.sort((x,y)=>(y.a+y.h)-(x.a+x.h))[0]); } // Golden: 2nd trigger auto-picks the strongest
  endTargeting();
  applyAuras(p.board); sfxPlace(); checkTriple(p); render();
}
function cancelTargeting(){
  const tg=state.targeting; if(!tg) return;
  const p=me(), i=p.board.indexOf(tg.src);
  if(i>=0){ p.board.splice(i,1); (p.hand=p.hand||[]).push(tg.src); }  // un-play: return the minion to hand
  endTargeting(); applyAuras(p.board); render();
}
// arrow from the source minion to the cursor
function srcCenter(){ const el=document.querySelector('#board .card.bc-src'); if(!el) return null; const r=el.getBoundingClientRect(); return {x:r.left+r.width/2, y:r.top+r.height*0.4}; }
function drawArrow(x,y){ const s=srcCenter(), path=document.getElementById('taPath'); if(!s||!path) return;
  const cx=(s.x+x)/2, cy=Math.min(s.y,y)-70; path.setAttribute('d', `M ${s.x} ${s.y} Q ${cx} ${cy} ${x} ${y}`); }
function hideArrow(){ const p=document.getElementById('taPath'); if(p) p.removeAttribute('d'); }
document.addEventListener('mousemove', e=>{ if(targetingActive()) drawArrow(e.clientX, e.clientY); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && targetingActive()) cancelTargeting(); });
document.addEventListener('contextmenu', e=>{ if(targetingActive()){ e.preventDefault(); cancelTargeting(); } });
document.addEventListener('click', e=>{ if(targetingActive() && !(e.target.closest && e.target.closest('#board'))) cancelTargeting(); }); // click off the board cancels

/* ============================== RESPONSIVE FIT ============================== */
// Pick the largest card height that lets the fixed (non-scrolling) layout fit the viewport,
// so the bottom row is never clipped — big cards on a true 1080 fullscreen, smaller when a
// maximized window's chrome/taskbar shrinks the usable height. Recomputed on every resize.
function fitCards(){
  const root=document.documentElement;
  // height of the rows that DON'T scale with card size (independent of --ch)
  let fixed=0;
  ['.tavern-row','.board-meta','.hand-label','.hero-row'].forEach(s=>{
    const el=document.querySelector(s); if(el) fixed+=el.getBoundingClientRect().height;
  });
  const TOPBAR=34, TABLE_PAD=22, PLAY_PAD=20, SLACK=46;   // chrome + margins/gaps cushion
  const avail = window.innerHeight - TOPBAR - TABLE_PAD - PLAY_PAD - fixed - SLACK;
  // three card rows ≈ board(ch+22) + shop(chS+30) + hand(chS+24), chS≈0.925·ch  → 2.85·ch + 76
  let ch = (avail - 76) / 2.85;
  ch = Math.max(120, Math.min(216, ch));
  const chS = ch*0.925;
  root.style.setProperty('--ch',  Math.round(ch)+'px');
  root.style.setProperty('--cw',  Math.round(ch*0.694)+'px');
  root.style.setProperty('--chS', Math.round(chS)+'px');
  root.style.setProperty('--cwS', Math.round(chS*0.694)+'px');
}
window.addEventListener('resize', fitCards);

/* ============================== GO ============================== */
setupDrag();
newGame();
fitCards();
</script>
