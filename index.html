<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Battlegrounds</title>
<style>
  :root{
    /* card sizing — scales with viewport height so the layout never clips the bottom.
       All card internals are expressed as fractions of --c (the card's own height),
       so changing only these four values rescales everything uniformly. */
    --cw:150px; --ch:216px; --cwS:138px; --chS:198px;   /* board / shop+hand */
    --gold:#f5c542; --gold-deep:#b8901f; --gold-light:#ffe79a;
    --ink:#f3e9d2; --muted:#c8b48c;
    --green:#46c95a; --red:#e5534b; --taunt:#d49037; --shield:#ffe07a;
    --felt:#27532f; --felt2:#163320;
    --wood1:#a9763c; --wood2:#7e5326; --wood3:#5c3c1b;
    --tavern:#b14bd6; --tavern2:#7d2ba6;
  }
  *{box-sizing:border-box; font-family:"Segoe UI",system-ui,sans-serif;}
  html,body{height:100%;}
  body{margin:0; color:var(--ink); overflow:hidden;
    background:radial-gradient(120% 100% at 50% -20%, #3a1e3f, #1a0e1d 55%, #0c0710 100%);}

  /* ---------- top status bar ---------- */
  #topbar{position:fixed; top:0; left:0; right:0; height:34px; z-index:30; display:flex; align-items:center;
    gap:14px; padding:0 16px; background:linear-gradient(180deg,#1c1208ee,#120c06ee);
    border-bottom:1px solid #00000099; box-shadow:0 2px 8px #0007;}
  #topbar .brand{font-size:12px; font-weight:800; letter-spacing:2px; color:var(--gold); text-shadow:0 1px 2px #000;}
  #topbar .phasechip{font-size:11px; font-weight:700; letter-spacing:.6px; padding:2px 11px; border-radius:20px;
    background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:#1a1209; text-transform:uppercase;}
  #topbar.combat .phasechip{background:linear-gradient(180deg,#e57a4b,#a8341f); color:#fff;}
  #topbar .rinfo{font-size:12px; color:var(--muted);} #topbar .rinfo b{color:var(--ink);}
  #topbar .spacer{flex:1;}

  /* ---------- table layout ---------- */
  #table{position:fixed; inset:34px 0 0 0; display:grid;
    grid-template-columns:88px minmax(0,1fr) 182px; gap:0; padding:10px 7px 12px; min-height:0;}

  /* the felt/wood play surface */
  #play{position:relative; display:flex; flex-direction:column; min-height:0; padding:10px 10px;
    border-radius:22px; overflow:hidden;
    background:
      radial-gradient(120% 80% at 50% 0%, #6a4a24 0%, #4a3219 38%, #2f2010 75%, #20150a 100%);
    border:2px solid #1c120899; box-shadow:0 14px 40px #000a, inset 0 2px 0 #ffffff14, inset 0 -30px 60px #0006;}
  /* faint wood plank lines */
  #play::before{content:""; position:absolute; inset:0; pointer-events:none; opacity:.16;
    background:repeating-linear-gradient(90deg, #00000040 0 2px, transparent 2px 92px);}
  /* ornate gold rim */
  #play::after{content:""; position:absolute; inset:5px; border-radius:17px; pointer-events:none;
    border:2px solid #f5c54222; box-shadow:inset 0 0 0 1px #00000055;}

  /* ---------- tavern (Bob) row ---------- */
  .tavern-row{position:relative; z-index:2; display:flex; align-items:center; justify-content:center;
    gap:26px; padding:4px 0 10px;}
  .bob{display:flex; flex-direction:column; align-items:center; gap:2px; min-width:130px;}
  .bob-portrait{width:66px; height:66px; border-radius:50%; font-size:38px; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 40% 30%, #caa066, #6e4a23); border:3px solid var(--gold-deep);
    box-shadow:0 3px 8px #0008, inset 0 2px 4px #ffffff44, 0 0 0 2px #00000066;}
  .bob-name{font-size:13px; font-weight:700; color:var(--gold-light); text-shadow:0 1px 2px #000; letter-spacing:.4px;}
  .bob-tier{font-size:11px; color:var(--muted);} .bob-tier b{color:#d7a3ff;}

  /* round tavern buttons */
  .tav{appearance:none; border:none; cursor:pointer; position:relative; transition:transform .1s, filter .1s;
    display:flex; align-items:center; justify-content:center;}
  .tav:disabled{filter:grayscale(.6) brightness(.6); cursor:not-allowed;}
  .tav:not(:disabled):hover{transform:translateY(-2px) scale(1.05);}
  .tav.tier-up{width:66px; height:70px; color:#2a1640; font-weight:800; font-size:26px;
    background:linear-gradient(180deg,var(--tavern),var(--tavern2)); border:2px solid #4a1668;
    border-radius:12px 12px 18px 18px; box-shadow:0 4px 8px #0008, inset 0 2px 3px #ffffff55;
    flex-direction:column; gap:0; line-height:1;}
  .tav.tier-up .lvl{font-size:24px; color:#ffe79a; text-shadow:0 1px 2px #000;}
  .tav.tier-up .cost{font-size:14px; background:radial-gradient(circle at 40% 30%,#ffe9a8,var(--gold) 70%); color:#1a1209;
    border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; margin-top:3px;
    border:1px solid #00000066; box-shadow:0 1px 2px #0007;}
  .tav.round-btn{width:60px; height:60px; border-radius:50%; font-size:27px; color:#fff;
    background:radial-gradient(circle at 38% 28%, #ffe9a8, var(--gold) 35%, var(--gold-deep) 90%);
    border:2px solid #6b4e12; box-shadow:0 4px 8px #0008, inset 0 2px 3px #ffffff77; text-shadow:0 1px 2px #0006;}
  .tav.freeze{background:radial-gradient(circle at 38% 28%, #d6f3ff, #6fc4e6 35%, #2e7fa8 90%); border-color:#1d5876;}
  .tav.freeze.active{box-shadow:0 0 0 3px #8fdcff, 0 0 14px #8fdcffaa, 0 4px 8px #0008; animation:froze 1.6s infinite;}
  @keyframes froze{50%{box-shadow:0 0 0 3px #c8efff,0 0 18px #c8efffcc,0 4px 8px #0008;}}

  /* ---------- zones ---------- */
  .zone{position:relative; z-index:2; display:flex; gap:5px; align-items:center; justify-content:center;
    padding:9px 7px; border-radius:14px; flex:0 0 auto; min-height:calc(var(--chS) + 30px); transition:box-shadow .15s;}
  .zone.shop{margin-bottom:6px; background:radial-gradient(120% 150% at 50% -10%, #5a3f1f, #34230f 80%);
    border:1px solid #00000088; box-shadow:inset 0 3px 18px #0008, inset 0 0 0 1px #f5c54218;}
  /* during combat the shop zone holds the enemy board */
  #play.combat .zone.shop{box-shadow:inset 0 0 0 2px #e5534b88, inset 0 3px 18px #0009;
    background:radial-gradient(120% 150% at 50% -10%, #5a2a22, #34160f 80%);}
  .zone.shop.sell-hover{box-shadow:inset 0 0 0 2px var(--gold), inset 0 3px 18px #0008;}
  .zone.shop.sell-hover::after{content:"💰 Drop to sell  (+1 gold)"; position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center; font-size:18px; font-weight:800; color:var(--gold);
    background:#1a120999; border-radius:14px; pointer-events:none; text-shadow:0 2px 4px #000; letter-spacing:.5px;}
  .zone.board{flex:1 1 auto; min-height:calc(var(--ch) + 22px);
    background:radial-gradient(120% 150% at 50% 40%, var(--felt), var(--felt2) 85%);
    border:1px solid #0a1f12; box-shadow:inset 0 3px 22px #000a, inset 0 0 0 1px #ffffff0f;}
  .zone.board.drag-hover{box-shadow:inset 0 0 0 2px var(--gold), inset 0 3px 22px #000a;}

  .card[draggable="true"]{cursor:grab;}
  .card[draggable="true"]:active{cursor:grabbing;}
  .card.noafford{cursor:not-allowed; filter:grayscale(.55) brightness(.8);}

  /* ---------- minion card ---------- */
  .card{--c:var(--ch); width:var(--cw); height:var(--ch); border-radius:16px; position:relative; cursor:pointer; flex:0 0 auto;
    background:linear-gradient(165deg,#b9892f,#6a4a1e 55%,#3a2811); border:2px solid #20160a;
    box-shadow:0 5px 9px #0008, inset 0 1px 0 #ffffff2a; transition:transform .12s, box-shadow .12s; user-select:none;}
  .card:hover{transform:translateY(-9px); box-shadow:0 18px 28px #000a, 0 0 16px #f5c54244, inset 0 1px 0 #ffffff33; z-index:6;}
  .card.sel{outline:3px solid var(--gold); outline-offset:1px; transform:translateY(-11px); box-shadow:0 20px 30px #000b, 0 0 22px #f5c54288;}
  /* targeted-battlecry arrow targeting */
  .card.targetable{outline:3px solid #5cc8ff; outline-offset:1px; cursor:crosshair; animation:tgtpulse 1s ease-in-out infinite;}
  @keyframes tgtpulse{0%,100%{box-shadow:0 0 14px #5cc8ff, 0 0 30px #5cc8ff88;} 50%{box-shadow:0 0 24px #5cc8ff, 0 0 54px #5cc8ffcc;}}
  .card.bc-src{outline:3px solid var(--gold); outline-offset:1px; box-shadow:0 0 20px #f5c54288;}
  body.targeting{cursor:crosshair;}
  body.targeting #board .card:not(.targetable):not(.bc-src){opacity:.45;}
  #targetArrow{position:fixed; inset:0; width:100vw; height:100vh; pointer-events:none; z-index:9000; display:none;}
  #taPath{filter:drop-shadow(0 2px 4px #000a);}
  body.targeting #targetArrow{display:block;}
  #targetHint{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:9001; display:none;
    background:#101826ee; color:var(--gold); border:1px solid var(--gold); padding:8px 16px; border-radius:20px;
    font-weight:600; font-size:14px; box-shadow:0 6px 20px #000a; pointer-events:none; white-space:nowrap;}
  body.targeting #targetHint{display:block;}
  .card.taunt{border-color:var(--taunt);}
  .card.taunt::before{content:""; position:absolute; inset:-3px; border-radius:18px; pointer-events:none;
    box-shadow:0 0 0 3px #d4903755, 0 0 14px #d4903766;}
  .card.shield{box-shadow:0 0 0 2px var(--shield), 0 0 16px 2px #ffe07a77, 0 5px 9px #0008;}
  /* inner art frame */
  .card .frame{position:absolute; inset:6px; border-radius:12px; overflow:hidden;
    background:radial-gradient(110% 70% at 50% 22%, #46603f, #233523 75%, #16241a); border:1px solid #00000066; z-index:1;}
  .card .art{position:absolute; top:calc(var(--c)*0.157); left:0; right:0; text-align:center;
    font-size:calc(var(--c)*0.278); line-height:1; filter:drop-shadow(0 2px 3px #0009); z-index:1;}
  .card .nm{position:absolute; top:calc(var(--c)*0.046); left:5px; right:5px; font-size:calc(var(--c)*0.074);
    line-height:1.05; text-align:center; font-weight:800; text-shadow:0 1px 2px #000,0 0 3px #000; z-index:3; color:#fff8e6;}
  .card .tribe{position:absolute; top:calc(var(--c)*0.444); left:0; right:0; text-align:center; font-size:calc(var(--c)*0.046);
    color:#ffeec2; opacity:.85; text-transform:uppercase; letter-spacing:1.4px; z-index:3; text-shadow:0 1px 2px #000;}
  .card .keys{position:absolute; top:calc(var(--c)*0.528); bottom:calc(var(--c)*0.204); left:2px; right:2px;
    text-align:center; font-size:calc(var(--c)*0.06); z-index:3; line-height:1.3;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;}
  .card .kw{display:inline-block; color:#fff3d2; font-weight:600; text-shadow:0 1px 2px #000,0 0 3px #000; cursor:help; padding:0 2px; border-radius:3px;}
  .card .kw:hover{background:#f5c54233;}
  /* attack / health gems — smaller, tucked into the bottom corners */
  .card .atk,.card .hp{position:absolute; bottom:calc(var(--c)*0.009); width:calc(var(--c)*0.158); height:calc(var(--c)*0.158);
    border-radius:50%; z-index:4; display:flex;align-items:center;justify-content:center; font-weight:800; font-size:calc(var(--c)*0.083); color:#fff;
    text-shadow:0 0 2px #000, 0 1px 1px #000, 0 0 4px #000a;
    border:2px solid #00000088; box-shadow:0 2px 4px #0008, inset 0 1px 1px #ffffff66;}
  .card .atk{left:2px; background:radial-gradient(circle at 35% 28%,#ffcf5e,#c9881a);}
  .card .hp{right:2px; background:radial-gradient(circle at 35% 28%,#ff6f63,#a31f1a);}
  /* tier banner — one star per tavern tier, sits on top of every card */
  .card,.slot{margin-top:16px;}
  .tavbanner{position:absolute; top:-16px; left:50%; transform:translateX(-50%); min-width:46px; height:24px; padding:0 8px;
    background:linear-gradient(180deg,var(--tavern),var(--tavern2)); border:1px solid #4a1668; border-radius:7px 7px 8px 8px;
    display:flex; align-items:center; justify-content:center; gap:1px; color:#ffe07a; font-size:12px; letter-spacing:1px;
    white-space:nowrap; z-index:5; box-shadow:0 2px 4px #0009, inset 0 1px 0 #ffffff55;}
  .tavbanner::after{content:""; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
    border-left:7px solid transparent; border-right:7px solid transparent; border-top:6px solid var(--tavern2);}

  /* empty slot */
  .slot{width:var(--cw); height:var(--ch); border-radius:16px; flex:0 0 auto; border:2px dashed #ffffff1c;
    background:#ffffff07; display:flex; align-items:center; justify-content:center;}
  .slot::after{content:"+"; color:#ffffff1f; font-size:32px; font-weight:300;}
  .zone.shop .slot{border-color:#f5c5422e; background:#f5c5420a;}
  .board-empty{color:#ffffff26; font-size:14px; font-weight:600; letter-spacing:.4px; pointer-events:none;}

  /* ---------- hand ---------- */
  .hand-label{position:relative; z-index:2; display:flex; align-items:center; gap:8px; margin:9px 2px 3px; font-size:11px;
    font-weight:800; letter-spacing:.6px; color:#cdb98f; text-transform:uppercase;}
  .hand-count{font-weight:700; color:var(--muted);}
  #play.combat .hand-label, #play.combat .zone.hand{display:none;}
  .zone.hand{min-height:calc(var(--chS) + 24px); padding:8px 7px; background:radial-gradient(120% 150% at 50% 120%, #2b3550, #141b2c 82%);
    border:1px solid #00000088; box-shadow:inset 0 -3px 18px #0008, inset 0 0 0 1px #7da2ff1f; flex-wrap:wrap;}
  .zone.hand.drag-hover{box-shadow:inset 0 0 0 2px #7da2ff, inset 0 0 18px #000a;}
  .zone.hand .card,.zone.hand .slot{margin-top:14px;}
  .hand-empty{color:#ffffff33; font-size:13px; font-weight:600; letter-spacing:.3px; padding:18px 10px; text-align:center;}

  /* hand/shop cards a touch smaller so a full hand fits (internals follow --c) */
  .card.z-hand,.card.z-shop{--c:var(--chS); width:var(--cwS); height:var(--chS);}

  /* ---------- spell card ---------- */
  .card.spell{background:linear-gradient(165deg,#5b3f8f,#3a2766 55%,#241640); border-color:#1b1030;}
  .card.spell .frame{background:radial-gradient(110% 70% at 50% 22%, #4a3f7a, #271d46 75%, #170f2c); border-color:#00000066;}
  .card.spell .tribe{color:#dcccff;}
  .card.spell .spelltext{position:absolute; bottom:12px; left:8px; right:8px; text-align:center; font-size:11px;
    line-height:1.25; color:#f1ebff; z-index:3; text-shadow:0 1px 2px #000;}
  .card.spell .spellcost{position:absolute; top:-16px; left:50%; transform:translateX(-50%); width:26px; height:26px; min-width:0;
    border-radius:50%; background:radial-gradient(circle at 35% 28%,#ffcf5e,#c9881a); color:#3a2400; border:2px solid #00000088;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; z-index:5;
    box-shadow:0 2px 4px #0009, inset 0 1px 1px #ffffff88;}

  /* ---------- discover overlay ---------- */
  .overlay{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center;
    background:radial-gradient(80% 80% at 50% 40%, #1a1207dd, #000000ee); backdrop-filter:blur(3px);}
  .overlay.show{display:flex;}
  .discover-box{display:flex; flex-direction:column; align-items:center; gap:6px; padding:26px 34px;
    border-radius:18px; background:linear-gradient(180deg,#2a1d0e,#160f06); border:1px solid #f5c54240;
    box-shadow:0 24px 60px #000c, inset 0 0 0 1px #f5c54222, 0 0 40px #f5c5421f;}
  .discover-title{font-size:21px; font-weight:900; color:var(--gold-light); letter-spacing:.5px; text-shadow:0 2px 6px #000;}
  .discover-sub{font-size:12px; color:var(--muted); margin-bottom:12px; letter-spacing:.4px;}
  .discover-cards{display:flex; gap:22px;}
  .discover-cards .card{cursor:pointer; transition:transform .12s, box-shadow .12s;}
  .discover-cards .card:hover{transform:translateY(-12px) scale(1.04); box-shadow:0 22px 34px #000b, 0 0 24px #f5c542aa; z-index:6;}

  /* ---------- golden minion ---------- */
  .card.golden{border-color:#ffd34d; box-shadow:0 0 0 2px #ffd34d, 0 0 18px 3px #ffcf5e88, 0 5px 9px #0008;
    background:linear-gradient(165deg,#f0c44e,#9c7320 55%,#5a3f12);}
  .card.golden .frame{box-shadow:inset 0 0 14px #ffe79a55;}
  .card.golden .goldbadge{position:absolute; top:-14px; right:-6px; font-size:18px; z-index:6;
    filter:drop-shadow(0 1px 2px #000); animation:goldSpin 3s linear infinite;}
  @keyframes goldSpin{0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.18);}100%{transform:rotate(360deg) scale(1);}}

  /* ---------- board meta ---------- */
  .board-meta{position:relative; z-index:2; display:flex; align-items:center; gap:7px; margin:5px 2px 0; font-size:11px; color:var(--muted);}
  .board-meta #boardCount{margin-right:auto; font-weight:700;}
  .mini{appearance:none; border:1px solid #00000088; border-radius:7px; padding:4px 10px; font-size:11px; font-weight:700;
    color:var(--ink); cursor:pointer; background:linear-gradient(180deg,#42321a,#2c2010); transition:.1s;}
  .mini:hover:not(:disabled){border-color:var(--gold); transform:translateY(-1px);}
  .mini:disabled{opacity:.35; cursor:not-allowed;}
  .mini.danger{background:linear-gradient(180deg,#7a342e,#5a2420);}

  /* ---------- hero row ---------- */
  .hero-row{position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:20px; margin-top:auto; padding-top:8px;}
  .gold-pips{display:flex; gap:3px; flex-wrap:wrap; max-width:170px; justify-content:flex-end;}
  .gold-pips .pip{width:15px; height:15px; border-radius:50%; background:#00000055; border:1px solid #00000088; box-shadow:inset 0 1px 2px #0008;}
  .gold-pips .pip.on{background:radial-gradient(circle at 38% 30%, #ffe9a8, var(--gold) 55%, var(--gold-deep)); border-color:#6b4e12; box-shadow:0 0 4px #f5c54288, inset 0 1px 1px #fff8;}
  .hero{position:relative; display:flex; flex-direction:column; align-items:center;}
  .hero-portrait{width:74px; height:74px; border-radius:50%; font-size:42px; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 40% 30%, #7a4f8c, #3a2247); border:3px solid var(--gold-deep);
    box-shadow:0 4px 10px #000a, inset 0 2px 5px #ffffff44, 0 0 0 2px #00000066;}
  .hero-hp{position:absolute; bottom:-6px; right:-6px; min-width:28px; height:28px; padding:0 5px; border-radius:15px;
    background:radial-gradient(circle at 35% 28%,#ff7e72,#a31f1a); border:2px solid #5a0f0c; color:#fff; font-weight:800; font-size:15px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px #0009, inset 0 1px 1px #ffffff66;}

  /* ---------- big right-side End Turn / combat buttons ---------- */
  .endturn{appearance:none; width:100%; cursor:pointer; padding:18px 12px; border-radius:14px; font-size:17px; font-weight:800; letter-spacing:.5px;
    color:#0c2410; background:linear-gradient(180deg,#7ee08a,#2f9a3f); border:2px solid #00000055;
    box-shadow:0 5px 12px #0008, inset 0 2px 3px #ffffff66; transition:.1s; line-height:1.2;}
  .endturn:hover:not(:disabled){transform:translateY(-2px); filter:brightness(1.07);}
  .endturn:disabled{opacity:.4; cursor:not-allowed; filter:grayscale(.5);}
  .endturn.alt{color:#1a1209; background:linear-gradient(180deg,#ffd75e,var(--gold-deep));}   /* Skip */
  .endturn.go{color:#0c2410; background:linear-gradient(180deg,#7ee08a,#2f9a3f);}              /* Continue */

  /* combat result banner over the felt */
  #resultBanner{position:absolute; left:0; right:0; top:46%; transform:translateY(-50%); z-index:20; text-align:center;
    pointer-events:none; opacity:0; transition:opacity .25s;}
  #resultBanner.show{opacity:1;}
  #resultBanner span{display:inline-block; font-size:42px; font-weight:900; padding:12px 32px; border-radius:16px;
    background:#0a0a0add; border:2px solid var(--gold); text-shadow:0 2px 6px #000; box-shadow:0 12px 40px #000c;}
  #resultBanner .win{color:#8ef09a; border-color:#5fd06f;}
  #resultBanner .lose{color:#ff9a92; border-color:#e5534b;}
  /* hide buy-phase chrome while combat plays out on the board */
  #play.combat .tav{display:none;}
  #play.combat .board-meta{visibility:hidden;}
  #play.combat .gold-pips{visibility:hidden;}

  /* ---------- left roster strip ---------- */
  #rosterStrip{display:flex; flex-direction:column; min-height:0; padding-right:6px;}
  #roster{display:flex; flex-direction:column; gap:5px; overflow-y:auto; padding:2px;}
  .rp{position:relative; display:flex; flex-direction:column; align-items:center; gap:1px; padding:4px 3px 5px;
    border-radius:9px; border:1px solid #ffffff12; background:#ffffff08;}
  .rp.you{background:#f5c5421f; border-color:#f5c54255;}
  .rp.dead{opacity:.34; filter:grayscale(1);}
  .rp-portrait{position:relative; width:40px; height:40px; border-radius:50%; font-size:22px; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 40% 30%, #5a4326, #2c1f10); border:2px solid #00000088;}
  .rp.you .rp-portrait{border-color:var(--gold);}
  .rp-tier{position:absolute; top:-3px; left:-3px; width:16px; height:16px; border-radius:50%; font-size:9px; font-weight:800;
    background:linear-gradient(180deg,var(--tavern),var(--tavern2)); color:#fff; border:1px solid #4a1668;
    display:flex; align-items:center; justify-content:center;}
  .rp-name{font-size:9.5px; font-weight:600; color:var(--ink); max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .rp.dead .rp-name{text-decoration:line-through;}
  .rp-hp{font-size:12px; font-weight:800; color:#ff948c;}

  /* ---------- right rail ---------- */
  #rail{display:flex; flex-direction:column; min-height:0; padding-left:8px; gap:8px;}
  .gold-readout{flex:0 0 auto; text-align:center; font-size:13px; font-weight:800; color:var(--gold); padding:5px; border-radius:9px;
    background:#0006; border:1px solid #f5c54233;}
  .gold-readout span:last-child{font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px;}
  /* End Turn / Skip / Continue live here, vertically centered = right-middle of screen */
  #rctl{flex:0 0 auto; margin-top:auto; margin-bottom:auto; display:flex; flex-direction:column; gap:8px;}
  #log{flex:0 0 auto; height:150px; overflow-y:auto; font-size:11.5px; line-height:1.5; background:#0006; border:1px solid #ffffff12; border-radius:9px; padding:9px;}
  #log div{padding:1px 0;}
  #log .you{color:var(--gold);} #log .win{color:var(--green);} #log .lose{color:#ff8a82;} #log .sys{color:var(--muted);}

  /* ---------- keyword tooltip ---------- */
  #tip{position:fixed; z-index:80; max-width:250px; pointer-events:none; opacity:0; transform:translateY(4px);
    transition:opacity .1s; background:linear-gradient(180deg,#2a1d0e,#1a1207); border:1px solid var(--gold);
    border-radius:11px; padding:10px 12px; box-shadow:0 12px 34px #000c, 0 0 0 1px #00000088;}
  #tip.show{opacity:1; transform:translateY(0);}
  #tip .tip-head{display:flex; align-items:center; gap:9px; margin-bottom:6px;}
  #tip .tip-art{font-size:26px; line-height:1;}
  #tip .tip-name{font-size:13px; font-weight:800; color:var(--gold-light);}
  #tip .tip-sub{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  #tip .tip-stats{margin-left:auto; font-size:15px; font-weight:800;}
  #tip .tip-stats .a{color:#ffcf5e;} #tip .tip-stats .h{color:#ff8a82;}
  #tip .tip-kws{border-top:1px solid #ffffff1c; padding-top:6px; display:flex; flex-direction:column; gap:6px;}
  #tip .tk b{display:block; font-size:11.5px; color:#ffe79a;}
  #tip .tk span{display:block; font-size:11px; color:var(--ink); opacity:.9; line-height:1.35;}
  #tip .tip-empty{font-size:11px; color:var(--muted); font-style:italic;}

  /* ---------- combat animations (played on the main board) ---------- */
  /* attacker flash on impact */
  .card.strike{filter:brightness(1.3) drop-shadow(0 0 10px var(--gold));}
  /* defender recoil shake */
  .card.hurt{animation:hsHurt .34s ease;}
  @keyframes hsHurt{0%,100%{transform:translate(0,0) rotate(0);}
    18%{transform:translate(-7px,2px) rotate(-5deg);}
    40%{transform:translate(6px,-1px) rotate(4deg);}
    62%{transform:translate(-4px,1px) rotate(-2deg);}
    82%{transform:translate(2px,0) rotate(1deg);}}
  /* health gem pops red when damaged */
  .card .hp.dmg{animation:hpHit .42s ease;}
  .card .hp.dmg.poison{animation:hpPoison .42s ease;}
  @keyframes hpHit{0%{transform:scale(1);}28%{transform:scale(1.6); box-shadow:0 0 14px #ff5b5b,0 2px 4px #0008,inset 0 1px 1px #ffffff66;}100%{transform:scale(1);}}
  @keyframes hpPoison{0%{transform:scale(1);}28%{transform:scale(1.6); box-shadow:0 0 14px #8bd450,0 2px 4px #0008,inset 0 1px 1px #ffffff66;}100%{transform:scale(1);}}
  /* floating damage number */
  .card .dmgnum{position:absolute; top:34px; left:0; right:0; text-align:center; z-index:9; pointer-events:none;
    font-size:24px; font-weight:900; color:#ff5b5b; text-shadow:0 0 5px #000,0 2px 3px #000,0 0 10px #ff000088;
    animation:dmgFloat .7s ease-out forwards;}
  .card .dmgnum.poison{color:#9be86a; text-shadow:0 0 5px #000,0 2px 3px #000,0 0 10px #4caf2288;}
  @keyframes dmgFloat{0%{opacity:0; transform:translateY(6px) scale(.6);}
    20%{opacity:1; transform:translateY(-6px) scale(1.15);}
    100%{opacity:0; transform:translateY(-34px) scale(1);}}
  /* death */
  .card.dying{animation:hsDie .24s ease-in forwards; pointer-events:none; z-index:1;}
  @keyframes hsDie{to{opacity:0; transform:scale(.55) rotate(10deg);}}
  /* divine shield breaking */
  .card.shieldpop{animation:shPop .36s ease;}
  @keyframes shPop{0%{box-shadow:0 0 0 3px var(--shield),0 0 22px 5px #ffe07a;}100%{box-shadow:none;}}
  #toast{position:fixed; top:54px; left:50%; transform:translateX(-50%); background:#000d; border:1px solid var(--gold);
    color:var(--gold); padding:9px 18px; border-radius:9px; font-size:14px; font-weight:600; opacity:0; transition:.25s;
    pointer-events:none; z-index:70; box-shadow:0 6px 20px #0009;}
  #toast.show{opacity:1;}

  /* ---------- responsive ---------- */
  @media (max-width: 900px){
    body{overflow:auto;}
    #table{position:static; inset:auto; height:auto; grid-template-columns:1fr; gap:10px; padding:44px 10px 14px;}
    #rosterStrip{order:3; padding:0;}
    #roster{flex-direction:row; flex-wrap:wrap;}
    #rail{order:2; padding:0;} #log{height:120px; flex:none;}
    #play{order:1; padding:12px;}
    .zone{flex-wrap:wrap;}
  }
  /* Scale cards to the viewport HEIGHT so the fixed (non-scrolling) layout never clips the
     bottom. Big on a true 1080 fullscreen; shrinks for maximized windows (taskbar + chrome). */
  @media (max-height: 1015px){ :root{ --cw:138px; --ch:198px; --cwS:128px; --chS:184px; } }

  @media (max-height: 815px) { :root{ --cw:108px; --ch:156px; --cwS:101px; --chS:146px; } }
  /* very narrow screens */
  @media (max-width: 520px){ :root{ --cw:100px; --ch:144px; --cwS:100px; --chS:144px; } }
</style>

  plunder:'⚓ Plunder', apex:'⛰ Apex', brood:'🐛 Brood', suppress:'🔇 Suppress',
  reflect:'🪞 Reflect', windfury:'↻ Windfury', reborn:'♻ Reborn'

// Legacy POOL shape (t / a / h) the rest of the engine expects.
const POOL = MINIONS.map(d=>({t:d.tier, name:d.name, a:d.atk, h:d.health, tribe:d.tribe, keywords:d.keywords||{}, id:d.id}));

const TIER_OFFERS = {1:3,2:4,3:4,4:5,5:5,6:6};
const UPGRADE_BASE = {2:5,3:7,4:8,5:9,6:10};
const MAX_BOARD = 7, MAX_HP = 30, MAX_TIER = 6, HAND_MAX = 10;

/* ============================== STATE ============================== */
let uid = 1;
function mk(def){ // instantiate a fresh minion from a pool def
  const k=def.keywords||{};
  return {id:uid++, def, name:def.name, a:def.a, h:def.h, maxh:def.h, tribe:def.tribe, t:def.t,
          taunt:!!k.taunt, shield:!!k.divineShield, cleave:!!k.cleave, windfury:!!k.windfury, reborn:!!k.reborn,
          bulwark:k.bulwark||0, kindle:k.kindle||0, haunt:k.haunt||0, toxin:!!k.toxin,
          plunder:k.plunder||0, apex:!!k.apex, brood:k.brood||0, suppress:!!k.suppress, reflect:!!k.reflect,
          aura:k.aura||null, fx:k.fx||null};
}
function buildPool(){ const arr=[]; POOL.forEach(d=>{ const copies = 16 - d.t*2; for(let i=0;i<copies;i++) arr.push(d); }); return arr; }

/* ============================== SPELLS ============================== */
// Tavern spells. They sit in the hand after purchase and are consumed when cast.
// target:'friendly' -> drag onto one of your minions;  target:'none' -> cast directly.
const SPELLS = [
  {sid:'spell_coin',     tier:1, name:'Tavern Coin',    cost:0, art:'🪙', target:'none',     text:'Gain 1 gold this turn.',                 cast:(p)=>{ p.gold=Math.min(10,p.gold+1); }},
  {sid:'spell_sharpen',  tier:1, name:'Sharpen',        cost:1, art:'🗡️', target:'friendly', text:'Give a friendly minion +2/+1.',           cast:(p,t)=>{ t.a+=2; t.h+=1; t.maxh+=1; }},
  {sid:'spell_reinforce',tier:1, name:'Reinforce',      cost:1, art:'🧱', target:'friendly', text:'Give a friendly minion +1/+2.',           cast:(p,t)=>{ t.a+=1; t.h+=2; t.maxh+=2; }},
  {sid:'spell_taunt',    tier:2, name:'Hold the Line',  cost:1, art:'🪨', target:'friendly', text:'Give a friendly minion Taunt and +0/+2.', cast:(p,t)=>{ t.taunt=true; t.h+=2; t.maxh+=2; }},
  {sid:'spell_bless',    tier:2, name:'Bless',          cost:2, art:'✦',  target:'friendly', text:'Give a friendly minion Divine Shield.',   cast:(p,t)=>{ t.shield=true; }},
  {sid:'spell_warcry',   tier:2, name:'War Cry',        cost:2, art:'📣', target:'none',     text:'Give your minions +1/+1.',               cast:(p)=>{ p.board.forEach(m=>{ m.a+=1; m.h+=1; m.maxh+=1; }); }},
  {sid:'spell_growth',   tier:3, name:'Greater Growth', cost:3, art:'🌿', target:'friendly', text:'Give a friendly minion +3/+3.',           cast:(p,t)=>{ t.a+=3; t.h+=3; t.maxh+=3; }},
  {sid:'spell_gust',     tier:4, name:'Gust',           cost:3, art:'↻',  target:'friendly', text:'Give a friendly minion Windfury.',        cast:(p,t)=>{ t.windfury=true; }},
];
// instantiate a spell as a shop/hand card
function mkSpell(def){ return {id:uid++, spell:true, sdef:def, name:def.name, cost:def.cost, art:def.art,
                               target:def.target, text:def.text, cast:def.cast}; }

// Combine three copies into one Golden minion: double the BASE stats, then add back the
// buffs the merged copies had accumulated (stats above base, minus aura contributions so
// auras don't double-count once the golden is re-aura'd on the board).
function makeGolden(copies){
  const def = copies[0].def;
  const base = mk(def);                 // a fresh, unbuffed instance = base stats/keywords
  const g = mk(def); g.golden=true;
  let addA=0, addH=0;
  copies.forEach(c=>{
    addA += (c.a - (c._aA||0)) - base.a;
    addH += (c.maxh - (c._aH||0)) - base.maxh;
  });
  g.a    = base.a*2    + Math.max(0,addA);
  g.maxh = base.maxh*2 + Math.max(0,addH);
  g.h    = g.maxh;
  // numeric keyword magnitudes: doubled base + extra stacks gained on the copies
  ['bulwark','kindle','haunt','plunder','brood'].forEach(k=>{
    let extra=0; copies.forEach(c=>{ extra += (c[k]||0) - (base[k]||0); });
    g[k] = (base[k]||0)*2 + Math.max(0,extra);
  });
  // boolean keyword grants (e.g. a spell gave Taunt/Divine Shield): keep if base or any copy has it
  ['taunt','shield','cleave','windfury','reborn','apex','suppress','reflect','toxin'].forEach(k=>{
    g[k] = !!(base[k] || copies.some(c=>c[k]));
  });
  if(g.aura) g.aura = {tribe:g.aura.tribe, a:g.aura.a*2, h:g.aura.h*2};   // double auras too
  return g;
}
// After any acquisition, fold three matching non-golden copies (across hand+board) into a Golden.
function checkTriple(p){
  const entries=[];
  (p.hand||[]).forEach(m=>{ if(m && !m.spell && !m.golden) entries.push({m,zone:'hand'}); });
  p.board.forEach(m=>{ if(m && !m.golden) entries.push({m,zone:'board'}); });
  const groups={};
  entries.forEach(x=>{ const id=x.m.def&&x.m.def.id; if(!id) return; (groups[id]=groups[id]||[]).push(x); });
  for(const id in groups){
    const g=groups[id];
    if(g.length>=3){
      const three=g.slice(0,3), set=new Set(three.map(x=>x.m));
      const onBoard=three.some(x=>x.zone==='board');
      let boardPos=null;
      if(onBoard) three.forEach(x=>{ if(x.zone==='board'){ const i=p.board.indexOf(x.m); if(boardPos==null||i<boardPos) boardPos=i; } });
      p.hand=(p.hand||[]).filter(m=>!set.has(m));
      p.board=p.board.filter(m=>!set.has(m));
      const golden=makeGolden(three.map(x=>x.m));
      if(onBoard){ p.board.splice(Math.min(boardPos,p.board.length),0,golden); applyAuras(p.board); }
      else p.hand.push(golden);
      if(p.you){ log(`✦ Triple! ${golden.name} became Golden`,'sys'); toast('✦ Golden '+golden.name+'!'); }
      offerDiscover(p);    // triple reward: discover a higher-tier minion
      checkTriple(p);      // handle 6-of-a-kind etc.
      return true;
    }
  }
  return false;
}

/* ============================== DISCOVER (triple reward) ============================== */
// Draw up to 3 distinct pool minions of the given tier (falls back to <=tier if scarce).
function drawDiscoverChoices(tier){
  const out=[];
  for(let n=0;n<3;n++){
    let elig=state.pool.map((d,i)=>({d,i})).filter(x=>x.d.t===tier);
    if(!elig.length) elig=state.pool.map((d,i)=>({d,i})).filter(x=>x.d.t<=tier);
    if(!elig.length) break;
    const pick=elig[Math.floor(Math.random()*elig.length)];
    state.pool.splice(pick.i,1); out.push(pick.d);
  }
  return out;
}
function discoverTier(p){ return Math.min(MAX_TIER, p.tier+1); }

let discoverActive=false, discoverCtx=null;
const discoverQueue=[];
function offerDiscover(p){
  if(!p.you){ aiDiscover(p); return; }
  discoverQueue.push(discoverTier(p));
  maybeShowDiscover();
}
function aiDiscover(p){
  const choices=drawDiscoverChoices(discoverTier(p));
  if(!choices.length) return;
  let best=choices[0]; choices.forEach(d=>{ if(d.a+d.h>best.a+best.h) best=d; });
  choices.forEach(d=>{ if(d!==best) returnToPool(d); });
  (p.hand=p.hand||[]).push(mk(best));   // AI plays it from hand later
}
function maybeShowDiscover(){
  if(discoverActive || !discoverQueue.length) return;
  const tier=discoverQueue.shift();
  const choices=drawDiscoverChoices(tier);
  if(!choices.length){ maybeShowDiscover(); return; }
  discoverActive=true;
  discoverCtx={ choices, insts:choices.map(d=>mk(d)) };
  const box=document.getElementById('discover');
  box.querySelector('.discover-cards').innerHTML =
    discoverCtx.insts.map((m,i)=>cardHTML(m,{idx:i,zone:'discover'})).join('');
  box.querySelectorAll('.card').forEach(el=>{ el.onclick=()=>pickDiscover(+el.dataset.idx); });
  box.classList.add('show');
}
function pickDiscover(i){
  if(!discoverCtx) return;
  const p=me();
  (p.hand=p.hand||[]).push(discoverCtx.insts[i]);
  discoverCtx.choices.forEach((d,j)=>{ if(j!==i) returnToPool(d); });   // unchosen go back to pool
  log(`Discovered ${discoverCtx.insts[i].name}`,'you');
  discoverCtx=null; discoverActive=false;
  document.getElementById('discover').classList.remove('show');
  checkTriple(p);          // a discovered copy can complete another triple
  maybeShowDiscover();     // show the next queued discover, if any
  render();
}

const AINAMES = ['Ragnaros','Jaina','Patches','Millhouse'];
let state;
function newGame(){
  state = {
    round:1, phase:'buy', pool:buildPool(), frozen:null,
    sel:null, combatRunning:false,
    players:[
      {name:'You', you:true, dead:false, hp:MAX_HP, tier:1, gold:3, goldMax:3, board:[], hand:[], turnsSinceUp:0},
      ...AINAMES.slice(0,3).map(n=>({name:n, you:false, dead:false, hp:MAX_HP, tier:1, gold:3, goldMax:3, board:[], hand:[], turnsSinceUp:0}))
    ]
  };
  me().shop = [];
  rollShop(me(), true);
  startBuyPhase();
}
const me = ()=> state.players[0];
const alive = ()=> state.players.filter(p=>!p.dead);

/* ============================== POOL DRAW ============================== */
function drawFromPool(maxTier){
  const eligible = state.pool.map((d,i)=>({d,i})).filter(x=>x.d.t<=maxTier);
  if(!eligible.length) return null;
  const pick = eligible[Math.floor(Math.random()*eligible.length)];
  state.pool.splice(pick.i,1);
  return pick.d;
}
function returnToPool(def){ if(def) state.pool.push(def); }

function rollShop(p, free){
  if(p.shop) p.shop.forEach(c=>returnToPool(c.def));
  const n = TIER_OFFERS[p.tier];
  p.shop = [];
  for(let i=0;i<n;i++){ const d=drawFromPool(p.tier); if(d) p.shop.push(mk(d)); }
  maybeOfferSpell(p);
  applyShopDiscounts(p);
}
// Roughly 40% of taverns offer one spell in place of a minion slot.
function maybeOfferSpell(p){
  if(!p.shop.length || Math.random()>=0.4) return;
  const elig=SPELLS.filter(s=>s.tier<=p.tier);
  if(!elig.length) return;
  const def=elig[Math.floor(Math.random()*elig.length)];
  const slot=Math.floor(Math.random()*p.shop.length);
  returnToPool(p.shop[slot].def);            // return the minion this spell displaces
  p.shop[slot]=mkSpell(def);
}
// Alchemist shop discounts: Transmuter (first minion slot -1), Elixir Master (random minion -3).
function applyShopDiscounts(p){
  if(!p.shop || !p.shop.length) return;
  p.shop.forEach(c=>{ if(!c.spell) c.cost=3; });
  if(p.board && p.board.some(m=>m.fx==='transmuter') && p.shop[0] && !p.shop[0].spell) p.shop[0].cost=Math.max(0,p.shop[0].cost-1);
  if(p.board && p.board.some(m=>m.fx==='elixir')){
    const mslots=p.shop.map((c,i)=>c.spell?-1:i).filter(i=>i>=0);
    if(mslots.length){ const i=mslots[Math.floor(Math.random()*mslots.length)]; p.shop[i].cost=Math.max(0,p.shop[i].cost-3); }
  }
}

/* ============================== BUY PHASE ============================== */
function startBuyPhase(){
  state.phase='buy';
  state.players.forEach(p=>{
    if(p.dead) return;
    p.goldMax = Math.min(10, 2+state.round) + (p.goldBonus||0); // round1 -> 3 gold
    p.gold = p.goldMax;
    p.turnsSinceUp++;
    // expire "this turn" buffs (Greenhorn's +2/+1 fresh-play bonus)
    p.board.forEach(m=>{ if(m._fresh){ m.a-=2; m.h-=1; m.maxh-=1; m._fresh=false; } });
  });
  // start-of-turn keyword effects (Alchemists, etc.)
  state.players.forEach(p=>{ if(p.dead) return; p.board.forEach(m=>{ if(m.fx && EFFECTS[m.fx] && EFFECTS[m.fx].startTurn) EFFECTS[m.fx].startTurn(p, m); }); });
  // human shop: keep if frozen else reroll
  if(state.frozen){ me().shop = state.frozen; state.frozen=null; }
  else rollShop(me(), true);
  state.sel=null;
  render();
  if(typeof fitCards==='function') fitCards();   // re-fit (hand row reappears after combat)
  log(`— Round ${state.round}: Buy Phase (${me().gold} gold) —`,'sys');
}

function upgradeCost(p){
  if(p.tier>=MAX_TIER) return Infinity;
  // Real BG: full base cost on the turn you reach a tier, then −1 per turn you wait.
  // turnsSinceUp is 1 on the arrival turn, so the discount is (turnsSinceUp − 1),
  // clamped to ≥0 so the cost never rises above base (e.g. right after upgrading).
  const discount = Math.max(0, p.turnsSinceUp - 1);
  return Math.max(0, UPGRADE_BASE[p.tier+1] - discount);
}

// Buy a shop card into the hand (HS-style). Minions are played to the board later.
function buyMinion(p, idx){
  const c = p.shop[idx];
  if(!c) return false;
  const cost = (c.cost!=null) ? c.cost : 3;
  if(p.gold<cost){ toast('Not enough gold'); return false; }
  if((p.hand||[]).length>=HAND_MAX){ toast('Hand is full'); return false; }
  p.gold-=cost; p.shop.splice(idx,1);
  (p.hand=p.hand||[]).push(c);
  if(!c.spell){
    // "after you buy a minion" acquisition effects (Plunder, Quartermaster, Dread Captain, ...)
    p.board.forEach(m=>{ if(m.plunder>0) m.a+=m.plunder; });
    if(c.plunder>0) c.a+=c.plunder;
    p.board.forEach(m=>{ if(m.fx && EFFECTS[m.fx] && EFFECTS[m.fx].onBuy) EFFECTS[m.fx].onBuy(p, m, c); });
  }
  if(p.you){ log(`Bought ${c.name}`,'you'); sfxBuy(); }
  checkTriple(p);
  return true;
}
// Play a minion from hand onto the board at pos. Battlecry fires here (twice if Golden).
function playMinion(p, handIdx, pos){
  const c = p.hand[handIdx];
  if(!c || c.spell) return false;
  if(p.board.length>=MAX_BOARD){ toast('Board is full'); return false; }
  p.hand.splice(handIdx,1);
  if(pos==null || pos>p.board.length) p.board.push(c); else p.board.splice(pos,0,c);
  const fx = c.fx && EFFECTS[c.fx];
  // targeted battlecry: a human picks the target via the arrow; resolution (battlecry + checkTriple) is deferred to resolveTarget()
  if(p.you && fx && fx.bcTarget){
    const targets = fx.bcTarget(p, c);
    if(targets.length){ beginTargeting(c, targets); applyAuras(p.board); sfxPlace(); render(); return true; }
  }
  if(fx && fx.battlecry){
    fx.battlecry(p, c);
    if(c.golden) fx.battlecry(p, c);                 // Golden battlecries trigger twice
  }
  applyAuras(p.board);
  if(p.you) sfxPlace();
  checkTriple(p);
  return true;
}
// Convenience: buy a minion straight onto the board (used when dragging shop -> board).
function buyAndPlay(p, shopIdx, pos){
  const c = p.shop[shopIdx];
  const wasSpell = c && c.spell;
  const before = (p.hand||[]).length;
  if(!buyMinion(p, shopIdx)) return false;
  if(wasSpell) return true;                          // spells stay in hand to be cast
  if(p.hand.length>before) playMinion(p, p.hand.length-1, pos);  // not consumed by a triple
  return true;
}
// Cast a spell from hand. Friendly-target spells need a board minion in target.
function playSpell(p, handIdx, target){
  const s = p.hand[handIdx];
  if(!s || !s.spell) return false;
  if(s.target==='friendly'){
    if(!target){ toast('Drag the spell onto one of your minions'); return false; }
    s.cast(p, target);
  } else s.cast(p);
  p.hand.splice(handIdx,1);
  applyAuras(p.board);
  if(p.you) log(`Cast ${s.name}`,'you');
  return true;
}
function moveMinion(from, to){
  const b=me().board;
  if(from===to || from===to-1) return; // no-op
  const [m]=b.splice(from,1);
  if(from<to) to--;
  if(to>b.length) to=b.length;
  b.splice(to,0,m);
  applyAuras(b);
  state.sel=to;
}
function sellMinion(p, idx){
  const c=p.board[idx];
  if(c.tribe==='Titans'){ p._titansSold=(p._titansSold||0)+1;                          // running total feeds The Titan's capstone
    const amt=2+2*p.board.filter(m=>m.fx==='singularity').length;                       // Apex: +2/+2, each Singularity on board adds another +2/+2
    p.board.forEach(m=>{ if(m!==c && m.apex){ m.a+=amt; m.h+=amt; m.maxh+=amt; } }); }
  p.board.forEach(m=>{ if(m!==c && m.fx && EFFECTS[m.fx] && EFFECTS[m.fx].onSell) EFFECTS[m.fx].onSell(p, m, c); });
  p.gold=Math.min(10,p.gold+1);
  p.board.splice(idx,1);
  returnToPool(c.def);
  applyAuras(p.board);
  if(p.you){ log(`Sold ${c.name} (+1g)`,'you'); sfxSell(); }
}
function doUpgrade(p){
  const cost=upgradeCost(p);
  if(p.tier>=MAX_TIER){ toast('Max tier'); return; }
  if(p.gold<cost){ toast('Not enough gold'); return; }
  p.gold-=cost; p.tier++; p.turnsSinceUp=0;
  if(p.you) log(`Upgraded to Tavern Tier ${p.tier}`,'you');
}
function doRoll(p){
  if(p._freeRefresh){ p._freeRefresh=false; rollShop(p); if(p.you) log('Refreshed tavern (free)','you'); return; }
  if(p.gold<1){ toast('Not enough gold'); return; }
  p.gold-=1; rollShop(p);
  if(p.you) log('Refreshed tavern','you');
}

/* auras: recompute bonuses from aura minions each change */
function applyAuras(board){
  board.forEach(m=>{ if(m._aA){ m.a-=m._aA; m._aA=0;} if(m._aH){ m.h-=m._aH; m.maxh-=m._aH; m._aH=0;} });
  board.forEach(src=>{
    if(!src.aura) return;
    board.forEach(m=>{
      if(m!==src && (src.aura.tribe==='all'||m.tribe===src.aura.tribe)){
        m.a+=src.aura.a; m._aA=(m._aA||0)+src.aura.a;
        m.h+=src.aura.h; m.maxh+=src.aura.h; m._aH=(m._aH||0)+src.aura.h;
      }
    });
  });
}
function buffTribe(board,tribe,a,h,who){
  let n=0; board.forEach(m=>{ if(m.tribe===tribe){ m.a+=a; m.h+=h; m.maxh+=h; n++; }});
  if(n) log(`${who}: buffed ${n} ${tribe}s +${a}/+${h}`,'you');
}

/* ============================== AI BUY ============================== */
// AI ignores spells when valuing shop slots (won't pick them).
function shopVal(c){ return c.spell ? -1 : c.a+c.h+(c.taunt?1:0)+(c.shield?2:0); }
// Buy a card to hand then immediately resolve the hand (play minions, cast simple spells).
function aiBuyPlay(p, idx){
  if(!buyMinion(p, idx)) return false;
  aiResolveHand(p);
  return true;
}
function aiResolveHand(p){
  let guard=0;
  while(p.hand && p.hand.length && guard++<30){
    const c=p.hand[0];
    if(c.spell){
      if(c.target==='none') playSpell(p,0,null);
      else if(p.board.length) playSpell(p,0,p.board[Math.floor(Math.random()*p.board.length)]);
      else break;                                   // no target available; leave it
    } else {
      if(p.board.length<MAX_BOARD) playMinion(p,0,p.board.length);
      else break;                                   // board full; keep in hand
    }
  }
}
function aiTakeTurn(p){
  if(!p.shop) rollShop(p, true);
  // try upgrade early when affordable and low tier
  if(p.tier<MAX_TIER && p.gold>=upgradeCost(p) && (p.board.length>=3) && Math.random()<0.5 && state.round>=2){
    doUpgrade(p);
  }
  let guard=0;
  while(p.gold>=3 && guard++<20){
    if(p.board.length<MAX_BOARD){
      // buy best available minion (highest stats)
      if(p.shop.length===0){ if(p.gold>=1) doRoll(p); else break; continue; }
      let best=-1,bi=-1;
      p.shop.forEach((c,i)=>{ const v=shopVal(c); if(v>best){best=v;bi=i;} });
      if(bi>=0 && best>=0) aiBuyPlay(p,bi); else break;
    } else {
      // board full: sell weakest if a shop minion is clearly better, else stop
      if(p.shop.length){
        let bestShop=-1,si=-1; p.shop.forEach((c,i)=>{const v=shopVal(c);if(v>bestShop){bestShop=v;si=i;}});
        let worst=999,wi=-1; p.board.forEach((c,i)=>{const v=c.a+c.h;if(v<worst){worst=v;wi=i;}});
        if(si>=0 && bestShop>worst+2 && p.gold>=3){ sellMinion(p,wi); aiBuyPlay(p,si); }
        else break;
      } else break;
    }
  }
  aiResolveHand(p);   // play anything still sitting in hand
  // spend leftover gold on a roll occasionally
  if(p.gold>=1 && p.board.length<MAX_BOARD && Math.random()<0.3){ doRoll(p); aiTakeTurn(p); }
}

/* ============================== COMBAT ============================== */
function cloneBoard(board){
  return board.map(m=>({id:m.id,name:m.name,a:m.a,h:m.h,maxh:m.maxh,tribe:m.tribe,t:m.t,
    taunt:!!m.taunt,shield:!!m.shield,cleave:!!m.cleave,windfury:!!m.windfury,reborn:!!m.reborn,
    bulwark:m.bulwark||0,bulwark0:m.bulwark||0,shield0:!!m.shield,kindle:m.kindle||0,haunt:m.haunt||0,
    toxin:!!m.toxin,poison:0,suppress:!!m.suppress,apex:!!m.apex,brood:m.brood||0,
    reflect:!!m.reflect,fx:m.fx||null,reborned:false,gainedAtk:0,_pos:null}));
}
function mkToken(def){
  const k=def.keywords||{};
  return {id:uid++,name:def.name,a:def.atk,h:def.health,maxh:def.health,tribe:def.tribe,t:def.tier||1,
    taunt:!!k.taunt,shield:!!k.divineShield,cleave:!!k.cleave,windfury:!!k.windfury,reborn:!!k.reborn,
    bulwark:k.bulwark||0,bulwark0:k.bulwark||0,shield0:!!k.divineShield,kindle:k.kindle||0,haunt:k.haunt||0,
    toxin:!!k.toxin,poison:0,suppress:!!k.suppress,apex:!!k.apex,brood:k.brood||0,
    fx:k.fx||null,reborned:false,gainedAtk:0,_pos:null};
}
function callFx(m,hook,a){ if(m&&m.fx&&EFFECTS[m.fx]&&EFFECTS[m.fx][hook]) EFFECTS[m.fx][hook](a); }
function perma(ctx,m,da,dh){ const e=ctx.perma[m.id]||(ctx.perma[m.id]={a:0,h:0}); e.a+=da; e.h+=dh; }
function countKw(m){ let n=0; ['taunt','shield','cleave','windfury','reborn','suppress','apex','toxin'].forEach(k=>{if(m[k])n++;});
  ['bulwark','kindle','haunt','brood'].forEach(k=>{if(m[k]>0)n++;}); if(m.fx)n++; return n; }
function stripKeywords(m, mSide, bySide){
  if(mSide && mSide.some(x=>x.fx==='aegis')) return;
  m.taunt=false;m.shield=false;m.cleave=false;m.windfury=false;m.reborn=false;
  m.bulwark=0;m.kindle=0;m.haunt=0;m.toxin=false;m.apex=false;m.brood=0;m.suppress=false;m.reflect=false;m.fx=null;
  if(bySide) bySide.forEach(s=>{ if(s.fx==='nullsovereign'){ const al=bySide.filter(x=>x.h>0); if(al.length){ const t=al[Math.floor(Math.random()*al.length)]; t.a+=2; t.h+=2; t.maxh+=2; } } });  // Null Sovereign
}
function summon(side, def, near, ctx){
  if(side.length>=7) return null;
  const m=mkToken(def);
  let idx = near && near._pos!=null ? near._pos : side.length;
  side.splice(Math.min(idx,side.length),0,m);
  if(ctx){ ctx.summons[ctx.key(side)]++; side.forEach(a=>{ if(a!==m) callFx(a,'onSummon',{ctx,self:a,token:m,side}); }); }
  return m;
}
function applySuppress(side, foe){
  side.forEach((m,i)=>{ if(m.suppress){ [foe[i-1],foe[i],foe[i+1]].forEach(e=>{ if(e) stripKeywords(e,foe,side); }); }});
}
function triggerKindle(att, mineArr){
  mineArr.forEach(a=>{
    if(a.fx==='bellows' && a!==att){ att.a+=1; }
    if(a!==att && a.kindle>0 && a.h>0){
      a.a+=a.kindle; a.gainedAtk+=a.kindle;
      if(a.fx==='sunshatter'){ a.h+=a.kindle; a.maxh+=a.kindle; }
      if(a.fx==='forgekeeper'){ const o=mineArr.filter(x=>x!==a&&x.tribe==='Embers'&&x.h>0); if(o.length){ const t=o[Math.floor(Math.random()*o.length)]; t.a+=a.kindle; t.gainedAtk+=a.kindle; } }
    }
  });
}
function tickPoison(m, mineArr, ctx){
  const foe=ctx.foe(mineArr);
  let dmg=m.poison; if(foe.some(x=>x.fx==='decayengine')) dmg*=2;
  m.h-=dmg; ctx.events.push({type:'hit',id:m.id,h:m.h,dmg,poison:true});
  foe.forEach(x=>{ if(x.fx==='fungalbrute') x.a+=1; });
  cleanupBoards(ctx);
}
function runDeathrattle(m, side, foe, which, ctx){
  if(m.brood>0){ for(let i=0;i<m.brood;i++) summon(side,{name:'Swarmling',atk:1,health:1,tribe:'Swarm'},m,ctx); }
  callFx(m,'deathrattle',{ctx,self:m,side,foe,which});
}
function cleanupBoards(ctx){
  ['top','bot'].forEach(which=>{
    const side=which==='top'?ctx.top:ctx.bot;
    const foe=which==='top'?ctx.bot:ctx.top;
    for(let i=side.length-1;i>=0;i--){
      const m=side[i]; if(m.h>0) continue;
      if(m.fx==='gigaton' && !m.gigatonUsed){ m.gigatonUsed=true; m.h=1; ctx.events.push({type:'hit',id:m.id,h:1,dmg:0}); continue; } // survive at 1 HP — emit event so the animation snaps back up
      const diedPoisoned=m.poison>0;
      m._pos=i; side.splice(i,1);
      ctx.events.push({type:'death',id:m.id,side:which});
      ctx.deaths[which]++;
      side.forEach(a=>{ if(a.haunt>0) a.a+=a.haunt; });                       // Haunt
      side.slice().forEach(a=>callFx(a,'allyDeath',{ctx,self:a,dead:m,mine:side,foe,which}));
      if(diedPoisoned){ ctx.toxinDeaths[which]++; foe.slice().forEach(s=>callFx(s,'toxinDeath',{ctx,self:s,dead:m,mine:foe,foe:side})); }
      const inqAlive = foe.some(x=>x.fx==='inquisitor' && x.h>0);
      if(!inqAlive){ const times = side.some(a=>a.fx==='necrolord') ? 2 : 1; for(let r=0;r<times;r++) runDeathrattle(m, side, foe, which, ctx); }
      if(m.reborn && !m.reborned){
        const rb=Object.assign({},m); rb.id=uid++; rb.reborned=true; rb.poison=0;
        rb.h=(m.fx==='phoenix')?m.maxh:1; rb.bulwark=m.bulwark0||0; rb.bulwarkBroke=false; rb.shield=m.shield0||false; rb.gigatonUsed=false;
        side.splice(Math.min(m._pos,side.length),0,rb); ctx.events.push({type:'summon',side:which});
        side.forEach(a=>{ if(a!==rb) callFx(a,'onSummon',{ctx,self:a,token:rb,side}); });
      }
      ctx.lastDead[which]={name:m.name,a:m.a,maxh:m.maxh,tribe:m.tribe};
    }
  });
  if((ctx.top.some(m=>m.h<=0)||ctx.bot.some(m=>m.h<=0)) && (ctx._cd=(ctx._cd||0))<60){ ctx._cd++; cleanupBoards(ctx); ctx._cd--; }
}
function dealDamage(m, amount, sideArr, ctx, source){
  if(!m || amount<=0 || m.h<=0) return;
  if(m.shield){ m.shield=false; ctx.events.push({type:'shieldpop',id:m.id}); return; }
  if(m.bulwark>0){
    const absorbed=Math.min(m.bulwark,amount); m.bulwark-=absorbed; amount-=absorbed;
    if(absorbed>0){
      if(m.fx==='quartz') m.a+=1;
      if(m.fx==='magma'){ const foe=ctx.foe(sideArr); if(foe.length){ dealDamage(foe[Math.floor(Math.random()*foe.length)],absorbed,foe,ctx,m); } }
    }
    if(m.bulwark===0 && !m.bulwarkBroke){
      m.bulwarkBroke=true;
      if(m.fx==='worldcore' && !m.worldRefreshed){ m.worldRefreshed=true; m.bulwark=m.a; m.bulwarkBroke=false; }
      else if(m.fx==='unbroken'){ const foe=ctx.foe(sideArr); foe.slice().forEach(e=>dealDamage(e,8,foe,ctx,m)); }
    }
    if(amount<=0) return; // fully absorbed: no HP damage, no Toxin contact
  }
  m.h-=amount; ctx.events.push({type:'hit',id:m.id,h:m.h,dmg:amount});
  if(source && source.toxin && amount>0 && !(m.fx==='adamant' && m.bulwark>0)){
    if(!(sideArr && sideArr.some(x=>x.fx==='aegis'))){
      if(amount > m.poison) m.poison = amount;   // poison = damage dealt (scales with Attack); a fully-absorbed hit poisons for 0
      ctx.foe(sideArr).forEach(x=>{ if(x.fx==='cultivator'){ x.a++; x.h++; x.maxh++; } });  // Cultivator
    }
  }
}

// returns {events, result, dmg, finalTop, finalBot, perma}
function simulate(topBoard, botBoard, topTier, botTier, topP, botP){
  const top=cloneBoard(topBoard), bot=cloneBoard(botBoard);
  const events=[];
  const ctx={top,bot,events,perma:{},lastDead:{top:null,bot:null},
    summons:{top:0,bot:0},deaths:{top:0,bot:0},toxinDeaths:{top:0,bot:0},
    tierOf:{top:topTier,bot:botTier},playerOf:{top:topP||null,bot:botP||null}};
  ctx.key=(arr)=>arr===top?'top':'bot';
  ctx.foe=(arr)=>arr===top?bot:top;

  // ----- start of combat -----
  resolveReflectTribes(top); resolveReflectTribes(bot);   // Mirrors count as a real tribe in combat
  applySuppress(top,bot); applySuppress(bot,top);
  // Warden pre-pass: counterspell / sentinel neutralise enemy start-of-combat effects
  ['top','bot'].forEach(which=>{ const side=which==='top'?top:bot, foe=which==='top'?bot:top;
    side.forEach(m=>{
      if(m.fx==='counterspell') foe.forEach(e=>{ if(e.fx&&EFFECTS[e.fx]&&EFFECTS[e.fx].startCombat&&e.a<m.a) e._noStart=true; });
      if(m.fx==='sentinel'){ const t=foe.filter(e=>e.fx&&EFFECTS[e.fx]&&EFFECTS[e.fx].startCombat&&!e._noStart).sort((x,y)=>y.a-x.a)[0];
        if(t){ t._noStart=true; EFFECTS[t.fx].startCombat({ctx,self:m,mine:side,foe,which}); } }
    });
  });
  ['top','bot'].forEach(which=>{ const side=which==='top'?top:bot, foe=which==='top'?bot:top;
    side.slice().forEach(m=>{ if(!m._noStart) callFx(m,'startCombat',{ctx,self:m,mine:side,foe,which}); }); });
  cleanupBoards(ctx);

  let turn = top.length>bot.length?'top':bot.length>top.length?'bot':(Math.random()<.5?'top':'bot');
  let attIdx={top:0,bot:0}, guard=0;

  function targets(def){ const t=def.filter(m=>m.taunt); return t.length?t:def; }
  function doStrike(att, attArr, defArr){
    if(!att||att.h<=0||!defArr.length) return;
    const tgts=targets(defArr); const tgt=tgts[Math.floor(Math.random()*tgts.length)];
    const di=defArr.indexOf(tgt);
    events.push({type:'attack',att:att.id,def:tgt.id});
    dealDamage(tgt, att.a, defArr, ctx, att);
    dealDamage(att, tgt.a, attArr, ctx, tgt);
    if(att.cleave){ [defArr[di-1],defArr[di+1]].forEach(n=>{ if(n) dealDamage(n,att.a,defArr,ctx,att); }); }
    if(att.tribe==='Embers') triggerKindle(att, attArr);
    callFx(att,'onAttack',{ctx,self:att,mine:attArr,foe:defArr,target:tgt});
    cleanupBoards(ctx);
  }

  while(top.length && bot.length && guard++<400){
    const attArr=turn==='top'?top:bot, defArr=turn==='top'?bot:top;
    if(attArr.length && defArr.length){
      if(attIdx[turn]>=attArr.length) attIdx[turn]=0;
      const att=attArr[attIdx[turn]];
      if(att && att.a>0 && att.h>0){
        if(defArr.length){
          doStrike(att, attArr, defArr);
          if(att.windfury && att.h>0 && defArr.length) doStrike(att, attArr, defArr);
        }
        if(att.h>0 && att.poison>0) tickPoison(att, attArr, ctx);   // Toxin ticks AFTER it attacks
      }
      attIdx[turn]++;
    }
    turn = turn==='top'?'bot':'top';
  }

  // end of combat: lingering Toxin takes one final tick — a poisoned survivor can still wither away,
  // and if the last minion standing dies to it the combat becomes a tie.
  ['top','bot'].forEach(which=>{ const side=which==='top'?top:bot;
    side.slice().forEach(m=>{ if(m.h>0 && m.poison>0) tickPoison(m, side, ctx); }); });
  cleanupBoards(ctx);

  ['top','bot'].forEach(which=>{ const side=which==='top'?top:bot, foe=which==='top'?bot:top;
    side.slice().forEach(m=>callFx(m,'endCombat',{ctx,self:m,mine:side,foe,which})); });

  let result, dmg=0;
  if(top.length && !bot.length){ result='top'; dmg=topTier + top.reduce((s,m)=>s+m.t,0); }
  else if(bot.length && !top.length){ result='bot'; dmg=botTier + bot.reduce((s,m)=>s+m.t,0); }
  else result='tie';
  return {events, result, dmg, finalTop:top, finalBot:bot, perma:ctx.perma};
}

/* ----- Mirrors helpers ----- */
// On a combat clone, rewrite each Reflect minion's tribe to the tribe it mirrors,
// so every tribe-synergy check in the engine treats it as that tribe.
function resolveReflectTribes(board){
  board.forEach((m,i)=>{
    let mirror=null;
    if(m.fx==='prism'||m.fx==='infinite'){            // "all tribes" -> join the biggest package
      const c={}; board.forEach(x=>{ if(x!==m && x.tribe!=='Mirrors') c[x.tribe]=(c[x.tribe]||0)+1; });
      mirror=Object.keys(c).sort((a,b)=>c[b]-c[a])[0]||null;
    } else if(m.reflect){
      const L=board[i-1]; mirror=L?L.tribe:null;
      if(m.fx==='mimic'){ const R=board[i+1]; if((!mirror||mirror==='Mirrors')&&R) mirror=R.tribe; }
    }
    if(mirror && mirror!=='Mirrors') m.tribe=mirror;
  });
}
// Copy keyword fields (not stats) from src onto dst; optionally adopt src's fx hook.
function copyKeywords(dst, src, withFx){
  ['taunt','shield','cleave','windfury','reborn','suppress','apex','toxin'].forEach(k=>{ if(src[k]) dst[k]=true; });
  ['bulwark','kindle','haunt','brood','plunder'].forEach(k=>{ if(src[k]>0) dst[k]=Math.max(dst[k]||0,src[k]); });
  dst.bulwark0=dst.bulwark||0; dst.shield0=!!dst.shield;
  if(withFx && src.fx) dst.fx=src.fx;
}
function strongestKwSource(board, self){
  const cand=board.filter(m=>m!==self && countKw(m)>0).sort((x,y)=>(y.a+y.h)-(x.a+x.h));
  return cand[0]||null;
}

/* ============================== KEYWORD EFFECTS ============================== */
// Tractable per-card effects. Generic keywords (Toxin/Bulwark/Kindle/Haunt/Plunder/
// Apex/Brood/Windfury/Reborn/Suppress/Cleave/Taunt/Shield) are handled in the engine above.
const EFFECTS = {
  // ----- Spores -----
  cultivator:{},                       // triggered inline in dealDamage (Toxin application)
  rotweaver:{ toxinDeath:(a)=>{ const e=a.foe.filter(m=>m.h>0); if(e.length){ dealDamage(e[Math.floor(Math.random()*e.length)],2,a.foe,a.ctx,null); } } },
  sporemother:{ startCombat:(a)=>{ a.mine.forEach(m=>{ if(m!==a.self) m.toxin=true; }); } }, // grants Toxin to your other minions for the combat
  plaguelord:{ onAttack:(a)=>{ const d=a.foe, ti=d.indexOf(a.target); [d[ti-1],d[ti+1]].forEach(n=>{ if(n && a.self.a>n.poison) n.poison=a.self.a; }); } }, // spreads its poison (= its Attack) to the target's neighbors
  fungalbrute:{},                      // +1 atk per Toxin tick handled in tickPoison
  decayengine:{},                      // doubles enemy Toxin ticks, handled in tickPoison
  mycelialqueen:{ deathrattle:(a)=>{ const e=a.foe.filter(m=>m.h>0).sort((x,y)=>y.h-x.h); if(e.length && a.self.a>e[0].poison) e[0].poison=a.self.a; } }, // poisons the highest-Health enemy for its Attack
  thewilting:{ toxinDeath:(a)=>{ const e=a.foe.filter(m=>m.h>0); if(e.length && a.dead.poison>0){ const t=e[Math.floor(Math.random()*e.length)]; if(a.dead.poison>t.poison) t.poison=a.dead.poison; } } }, // moves the dead minion's remaining poison to a new target
  eternalrot:{ endCombat:(a)=>{ const n=a.ctx.toxinDeaths[a.which==='top'?'bot':'top']||0; if(n>0) perma(a.ctx,a.self,n,n); } },
  // ----- Embers -----
  tinder:{ battlecry:(p,self)=>{ const e=p.board.filter(m=>m!==self&&m.tribe==='Embers'); if(e.length) e[Math.floor(Math.random()*e.length)].kindle=(e[0].kindle||0)+1; } },
  bellows:{},                          // reacts in triggerKindle
  forgekeeper:{},                      // shares Kindle in triggerKindle
  conflagar:{ startCombat:(a)=>{ a.mine.forEach(m=>{ if(m.tribe==='Embers') m.kindle=(m.kindle||0)+1; }); } },
  phoenix:{},                          // Reborn at full health handled in cleanup
  infernocore:{ onAttack:(a)=>{ a.mine.forEach(m=>{ if(m!==a.self&&m.kindle>0&&m.h>0){ m.a+=m.kindle; m.gainedAtk+=m.kindle; } }); } },
  eternalflame:{ endCombat:(a)=>{ const keep=Math.floor((a.self.gainedAtk||0)/2); if(keep>0) perma(a.ctx,a.self,keep,0); } },
  sunshatter:{},                       // Kindle adds health in triggerKindle
  // ----- Swarm -----
  hatchmother:{ startCombat:(a)=>summon(a.mine,{name:'Swarmling',atk:1,health:1,tribe:'Swarm'},null,a.ctx) },
  dronecaptain:{ onSummon:(a)=>{ if(a.token.tribe==='Swarm'){ a.token.a++; a.token.h++; a.token.maxh++; } } },

function gainGold(p,n){ if(p.board.some(m=>m.fx==='catalyst')) n+=1; p.gold=Math.min(10,p.gold+n); }
function applyPerma(sim){ if(!sim||!sim.perma) return; const map=sim.perma; state.players.forEach(p=>{ if(!p.board) return; p.board.forEach(m=>{ if(map[m.id]){ m.a+=map[m.id].a; m.h+=map[m.id].h; m.maxh+=map[m.id].h; } }); }); }

/* ============================== ROUND / PAIRING ============================== */
function endTurn(){
  if(state.phase!=='buy' || state.combatRunning) return;
  if(state.targeting){ toast('Pick a target first (Esc to cancel)'); return; }
  if(discoverActive){ toast('Pick your discover reward first'); return; }
  sfxEndTurn();
  // AI buy phases
  state.players.forEach(p=>{ if(!p.you && !p.dead) aiTakeTurn(p); });
  // end-of-turn keyword effects + gold snapshot (for combat scalers)
  state.players.forEach(p=>{ if(p.dead) return;
    p.board.forEach(m=>{ if(m.fx && EFFECTS[m.fx] && EFFECTS[m.fx].endTurn) EFFECTS[m.fx].endTurn(p, m); });
    if(p.gold===0) p.board.forEach(m=>{ if(m.fx==='grandwork'){ m.a+=5; m.h+=5; m.maxh+=5; } });
    p._goldLast = p.gold;
  });
  state.phase='combat';
  render();
  runCombatRound();
}

function makePairs(){
  const live = alive();
  const shuffled = [...live].sort(()=>Math.random()-.5);
  const pairs=[];
  for(let i=0;i<shuffled.length;i+=2){
    if(i+1<shuffled.length) pairs.push([shuffled[i],shuffled[i+1]]);
    else pairs.push([shuffled[i], ghostOf(live)]); // odd -> fight a ghost copy
  }
  return pairs;
}
function ghostOf(live){
  const dead = state.players.filter(p=>p.dead);
  const src = (dead.length?dead:live)[Math.floor(Math.random()*(dead.length?dead.length:live.length))];
  return {name:src.name+" (ghost)", ghost:true, board:src.board, tier:src.tier, hp:99, dead:false};
}

async function runCombatRound(){
  state.combatRunning=true;
  const pairs = makePairs();
  // find the human's match
  const myPair = pairs.find(pr=>pr.some(p=>p.you));
  // resolve AI-only matches silently
  pairs.forEach(pr=>{
    if(pr===myPair) return;
    resolveMatch(pr[0],pr[1],false);
  });
  // play human match with animation
  if(myPair){
    const opp = myPair[0].you?myPair[1]:myPair[0];
    await playMatch(me(), opp);
  }
  // check deaths / win
  afterCombat();
}

function resolveMatch(a,b,verbose){
  const sim = simulate(b.board, a.board, b.tier, a.tier, b, a); // top=b, bot=a
  applyResult(sim,a,b);
}
function applyResult(sim,a,b){
  // bot=a, top=b
  if(sim.result==='bot'){ if(!b.ghost){ b.hp-=sim.dmg; } }
  else if(sim.result==='top'){ if(!a.ghost){ a.hp-=sim.dmg; } }
  applyPerma(sim);
}

/* ============================== HUMAN COMBAT (animated, on the board) ============================== */
function setCombatBtns(mode){ // 'buy' | 'running' | 'done'
  document.getElementById('btnEnd').style.display      = mode==='buy'    ?'':'none';
  document.getElementById('btnSkip').style.display     = mode==='running'?'':'none';
  document.getElementById('btnContinue').style.display = mode==='done'   ?'':'none';
}
function endCombatUI(){
  document.getElementById('play').classList.remove('combat');
  document.getElementById('resultBanner').classList.remove('show');
  // restore Bob's tavern header
  document.getElementById('bobPortrait').textContent='🧔';
  document.getElementById('bobName').textContent="Bob's Tavern";
  setCombatBtns('buy');
}
function playMatch(player, opp){
  return new Promise(resolve=>{
    const sim = simulate(opp.board, player.board, opp.tier, player.tier, opp, player); // top=opp, bot=player
    const play=document.getElementById('play');
    play.classList.add('combat');
    document.getElementById('topbar').classList.add('combat');
    // the opponent takes over Bob's spot above the (now enemy) shop zone
    document.getElementById('bobPortrait').textContent = opp.ghost?'👻':'🤖';
    document.getElementById('bobName').textContent = '⚔ '+opp.name;
    document.getElementById('bobTier').textContent = opp.tier;
    setCombatBtns('running');

    // working copies — opponent renders into the shop zone (top), you into the board (bottom)
    const topState = cloneBoard(opp.board);
    const botState = cloneBoard(player.board);
    const findCard=(id)=> document.querySelector(`#play [data-cid="${id}"]`);
    renderArena(topState, botState);

    let i=0, skipped=false, done=false;
    const btnSkip=document.getElementById('btnSkip');
    const btnCont=document.getElementById('btnContinue');
    btnSkip.onclick=()=>{ skipped=true; };

    function finish(){
      if(done) return; done=true;
      const rb=document.getElementById('resultBanner');
      if(sim.result==='top'){ player.hp-=sim.dmg; rb.innerHTML=`<span class="lose">Defeat  −${sim.dmg}</span>`; log(`Lost to ${opp.name}: −${sim.dmg} health`,'lose'); }
      else if(sim.result==='bot'){ if(!opp.ghost) opp.hp-=sim.dmg; rb.innerHTML=`<span class="win">Victory!  ${sim.dmg} dmg</span>`; log(`Beat ${opp.name}: dealt ${sim.dmg}`,'win'); }
      else { rb.innerHTML=`<span>Draw</span>`; log(`Tied with ${opp.name}`,'sys'); }
      applyPerma(sim);
      renderArena(sim.finalTop, sim.finalBot);
      rb.classList.add('show');
      setCombatBtns('done');
      btnCont.onclick=()=>{ sfxContinue(); endCombatUI(); resolve(); };
    }

    function step(){
      if(done) return;
      if(skipped){ finish(); return; }
      if(i>=sim.events.length){ finish(); return; }
      const ev=sim.events[i++];
      applyEventVisual(ev, topState, botState, findCard, ()=>{
        // slower, with a clear pause before each new strike
        const nxt=sim.events[i];
        let delay;
        if(ev.type==='attack') delay=140;
        else if(ev.type==='hit') delay = (nxt && nxt.type==='attack') ? 520 : 150;
        else if(ev.type==='death') delay=150;
        else if(ev.type==='shieldpop') delay=200;
        else delay=130;
        // if a strike dealt no 'hit' events (e.g. fully absorbed) still pause before next attack
        if(ev.type==='attack' && nxt && nxt.type==='attack') delay=520;
        setTimeout(step, delay);
      });
    }
    setTimeout(step, 650);
  });
}

function applyEventVisual(ev, top, bot, findCard, next){
  const all=[...top,...bot];
  const get=(id)=>all.find(m=>m.id===id);
  if(ev.type==='attack'){
    const ac=findCard(ev.att), dc=findCard(ev.def);
    if(!ac||!dc){ next(); return; }
    lunge(ac, dc, ()=>{                         // on impact:
      bonk();                                   // play the bonk
      dc.classList.add('hurt');                 // defender recoils/shakes
      ac.classList.add('strike');               // attacker flashes
      setTimeout(()=>{ dc.classList.remove('hurt'); ac.classList.remove('strike'); }, 340);
      next();                                    // let the hit events (HP loss) play now
    });
    return;
  }
  if(ev.type==='hit'){
    const m=get(ev.id); if(m && ev.h!=null) m.h=ev.h;
    const el=findCard(ev.id);
    if(el && ev.h!=null){
      const hp=el.querySelector('.hp');
      if(hp){ hp.textContent=Math.max(0,ev.h);
        hp.classList.remove('dmg','poison'); void hp.offsetWidth;
        if(ev.poison) hp.classList.add('dmg','poison'); else hp.classList.add('dmg'); }
      spawnDmg(el, ev.dmg, ev.poison);
    }
    next(); return;
  }
  if(ev.type==='shieldpop'){
    const m=get(ev.id); if(m)m.shield=false;
    const el=findCard(ev.id); if(el){ el.classList.remove('shield'); el.classList.add('shieldpop'); setTimeout(()=>el.classList.remove('shieldpop'),360); }
    next(); return;
  }
  if(ev.type==='death'){
    const side = ev.side==='top'?top:bot;
    const el=findCard(ev.id);
    const idx=side.findIndex(m=>m.id===ev.id); if(idx>=0) side.splice(idx,1);
    if(el){ el.classList.add('dying'); setTimeout(()=>{ renderArena(top,bot); next(); }, 240); }
    else { renderArena(top,bot); next(); }
    return;
  }
  if(ev.type==='summon'){ renderArena(top,bot); next(); return; }
  next();
}

// Lunge the attacker most of the way toward the defender, fire impact(), then recoil home.
function lunge(ac, dc, impact){
  const a=ac.getBoundingClientRect(), d=dc.getBoundingClientRect();
  const dx=((d.left+d.width/2)-(a.left+a.width/2))*0.74;
  const dy=((d.top+d.height/2)-(a.top+a.height/2))*0.74;
  // lift the attacker's whole zone so it renders above the other zone (zones are
  // sibling stacking contexts, so a card's own z-index can't escape its zone).
  const zone=ac.closest('.zone'); if(zone) zone.style.zIndex='30';
  ac.style.zIndex='10';
  // wind-up: ease toward the target, slower so the charge reads clearly
  ac.style.transition='transform .26s cubic-bezier(.35,0,.8,.35)';
  ac.style.transform=`translate(${dx}px,${dy}px) scale(1.1)`;
  setTimeout(()=>{
    if(impact) impact();
    ac.style.transition='transform .34s cubic-bezier(.2,.8,.3,1)';
    ac.style.transform='';
    setTimeout(()=>{ ac.style.zIndex=''; ac.style.transition=''; if(zone) zone.style.zIndex=''; }, 340);
  }, 270);
}

// Floating "-N" damage number over a card.
function spawnDmg(el, dmg, poison){
  if(!dmg || dmg<=0) return;
  const d=document.createElement('div');
  d.className='dmgnum'+(poison?' poison':'');
  d.textContent='-'+dmg;
  el.appendChild(d);
  setTimeout(()=>d.remove(), 700);
}

// Combat plays out on the main board: opponent in the shop zone (top), you in the board zone (bottom).
function renderArena(top, bot){
  document.getElementById('shop').innerHTML  = top.map(m=>cardHTML(m,{combat:true})).join('') || '<div class="slot"></div>';
  document.getElementById('board').innerHTML = bot.map(m=>cardHTML(m,{combat:true})).join('') || '<div class="slot"></div>';
}

/* ============================== AFTER COMBAT ============================== */
function afterCombat(){
  state.players.forEach(p=>{
    if(!p.dead && p.hp<=0){ p.dead=true; p.hp=0; log(`${p.name} has been eliminated!`, p.you?'lose':'sys'); }
  });
  state.combatRunning=false;

  const live=alive();
  if(me().dead || live.length<=1){
    endGame(live);
    return;
  }
  state.round++;
  startBuyPhase();
}

function endGame(live){
  state.phase='over';
  const play=document.getElementById('play'); play.classList.add('combat');
  document.getElementById('bobName').textContent='Game Over';
  document.getElementById('bobPortrait').textContent='🏁';

  else if(me().dead) msg='<span class="lose">💀 You were eliminated</span>';
  else msg=`<span>Winner: ${live[0].name}</span>`;
